<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anything Report</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ── Toolbar ─────────────────────────────────────────────── -->
    <header>
        <span class="logo">Anything Report</span>
        <div class="view-toggle">
            <button class="view-btn active" data-view="slides">Slides</button>
            <button class="view-btn" data-view="doc">Doc</button>
        </div>
        <form id="configForm">
            <input type="text" id="queryUrl"
                   placeholder="Paste ADO query URL…" required>
            <input type="date" id="midpointDate"
                   title="Midpoint date (optional) — snapshot risk fields from this date">
            <button type="submit" id="runBtn">&#9654; Run</button>
        </form>
    </header>

    <!-- ── Slide deck ──────────────────────────────────────────── -->
    <main id="deck">
        <div id="empty">
            Paste an Azure DevOps query URL above and click
            <strong>Run</strong> to generate your report.
        </div>
        <div id="loading" hidden><div class="spinner"></div></div>
    </main>

    <!-- ── Navigation (slides) ─────────────────────────────────── -->
    <nav id="slideNav" hidden>
        <button id="prev" title="Previous (←)">&#9664;</button>
        <span id="counter"></span>
        <button id="next" title="Next (→)">&#9654;</button>
    </nav>

    <!-- ── Doc view ────────────────────────────────────────────── -->
    <div id="docView" class="doc-view" hidden>
        <div id="docContent" class="doc-content">
            <div id="docEmpty" class="doc-empty">
                Paste an Azure DevOps query URL above and click
                <strong>Run</strong> to generate the document.
            </div>
        </div>
    </div>

    <!-- ── Floating formatting toolbar (shared, positioned near focused editable) ── -->
    <div id="fmtBar" class="fmt-bar" hidden>
        <button type="button" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button type="button" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button type="button" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
        <span class="fmt-sep"></span>
        <button type="button" data-cmd="insertUnorderedList" title="Bullet list">&#8226; List</button>
        <button type="button" data-cmd="insertOrderedList" title="Numbered list">1. List</button>
    </div>

    <script>
        /* ── State ──────────────────────────────────────────────── */
        let total   = 0;
        let current = 0;
        let linkBase = '';
        let hasMidpoint = false;
        let activeView = 'slides';          // 'slides' | 'doc'
        let lastSlides = null;              // cache for view switches

        const $deck    = document.getElementById('deck');
        const $nav     = document.getElementById('slideNav');
        const $counter = document.getElementById('counter');
        const $empty   = document.getElementById('empty');
        const $loading = document.getElementById('loading');
        const $query   = document.getElementById('queryUrl');
        const $midDate = document.getElementById('midpointDate');
        const $run     = document.getElementById('runBtn');
        const $docView = document.getElementById('docView');
        const $docContent = document.getElementById('docContent');
        const $docEmpty   = document.getElementById('docEmpty');
        const $fmtBar     = document.getElementById('fmtBar');

        /* Restore saved inputs */
        $query.value   = localStorage.getItem('ar_query') || '';
        $midDate.value = localStorage.getItem('ar_middate') || '';

        /* ── View toggle ────────────────────────────────────────── */
        document.querySelectorAll('.view-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var view = btn.dataset.view;
                if (view === activeView) return;
                activeView = view;

                document.querySelectorAll('.view-btn').forEach(function (b) {
                    b.classList.toggle('active', b.dataset.view === view);
                });

                if (view === 'slides') {
                    $deck.hidden    = false;
                    $nav.hidden     = total === 0;
                    $docView.hidden = true;
                } else {
                    $deck.hidden    = true;
                    $nav.hidden     = true;
                    $docView.hidden = false;
                }
            });
        });

        /* ── Formatting toolbar (floats near focused editable) ── */
        document.querySelectorAll('#fmtBar button').forEach(function (btn) {
            btn.addEventListener('mousedown', function (e) {
                e.preventDefault();
                document.execCommand(btn.dataset.cmd, false, null);
            });
        });

        /* Show toolbar above whichever .doc-edit is focused */
        function positionToolbar(editEl) {
            var rect = editEl.getBoundingClientRect();
            $fmtBar.hidden = false;
            $fmtBar.style.top  = (rect.top + window.scrollY - $fmtBar.offsetHeight - 4) + 'px';
            $fmtBar.style.left = rect.left + 'px';
            $fmtBar.style.width = rect.width + 'px';
        }

        document.addEventListener('focusin', function (e) {
            if (e.target.classList.contains('doc-edit')) {
                positionToolbar(e.target);
            }
        });
        document.addEventListener('focusout', function (e) {
            if (e.target.classList.contains('doc-edit')) {
                /* Delay so toolbar button clicks register first */
                setTimeout(function () {
                    var active = document.activeElement;
                    if (!active || !active.classList.contains('doc-edit')) {
                        $fmtBar.hidden = true;
                    }
                }, 150);
            }
        });

        /* Reposition on scroll inside doc content */
        document.getElementById('docContent').addEventListener('scroll', function () {
            var focused = document.querySelector('.doc-edit:focus');
            if (focused) positionToolbar(focused);
        });

        /* ── Slide navigation ───────────────────────────────────── */
        function show(i) {
            current = Math.max(0, Math.min(i, total - 1));
            $deck.querySelectorAll('.slide').forEach(
                (s, idx) => s.classList.toggle('active', idx === current)
            );
            $counter.textContent = (current + 1) + ' / ' + total;
        }

        document.getElementById('prev').onclick = () => show(current - 1);
        document.getElementById('next').onclick = () => show(current + 1);
        document.addEventListener('keydown', function (e) {
            if (activeView !== 'slides') return;
            if (e.target.closest('.editable')) return;
            if (e.key === 'ArrowLeft')  show(current - 1);
            if (e.key === 'ArrowRight') show(current + 1);
        });

        /* ── Risk badge (pure string) ───────────────────────────── */
        function badge(risk) {
            var r = (risk || '').toLowerCase();
            if (r.includes('on track'))  return '<span class="risk on-track">&#10004; On Track</span>';
            if (r.includes('at risk'))   return '<span class="risk at-risk">&#9888; At Risk</span>';
            if (r.includes('off track')) return '<span class="risk off-track">&#10008; Off Track</span>';
            return '<span class="risk unknown">&mdash;</span>';
        }

        /* ── Render SLIDES view ─────────────────────────────────── */
        function renderSlides(slides) {
            var tom = $deck.querySelector('#tom');
            var savedTom = tom ? tom.innerHTML : (localStorage.getItem('ar_tom') || '');

            $deck.querySelectorAll('.slide').forEach(function (s) { s.remove(); });

            var topSlide = document.createElement('div');
            topSlide.className = 'slide active';
            topSlide.innerHTML =
                '<h2>Top of Mind</h2>' +
                '<div id="tom" class="editable" contenteditable="true" ' +
                'placeholder="Click here to type your top-of-mind items…">' +
                savedTom + '</div>';
            $deck.prepend(topSlide);

            topSlide.querySelector('#tom').addEventListener('input', function () {
                localStorage.setItem('ar_tom', this.innerHTML);
            });

            var colCount = hasMidpoint ? 6 : 4;

            for (var s = 0; s < slides.length; s++) {
                var slide = slides[s];
                var div = document.createElement('div');
                div.className = 'slide';

                var rows = '';
                if (slide.items.length === 0) {
                    rows = '<tr><td colspan="' + colCount + '" class="no-items">No child epics</td></tr>';
                } else {
                    for (var i = 0; i < slide.items.length; i++) {
                        var it = slide.items[i];
                        rows += '<tr>';
                        rows += '<td><a href="' + linkBase + it.id + '" target="_blank">' + it.id + '</a></td>';
                        rows += '<td>' + it.title + '</td>';

                        if (hasMidpoint) {
                            rows += '<td>' + badge(it.midpointRisk) + '</td>';
                            rows += '<td class="details">' + (it.midpointComment || '&mdash;') + '</td>';
                            rows += '<td>' + badge(it.risk) + '</td>';
                            rows += '<td class="details">' + (it.riskComment || '&mdash;') + '</td>';
                        } else {
                            rows += '<td>' + badge(it.risk) + '</td>';
                            rows += '<td class="details">' + (it.riskComment || '&mdash;') + '</td>';
                        }

                        rows += '</tr>';
                    }
                }

                var headers = '<th>ID</th><th>Title</th>';
                if (hasMidpoint) {
                    headers += '<th>Midpoint Risk</th><th>Midpoint Details</th>';
                    headers += '<th>Final Risk</th><th>Final Details</th>';
                } else {
                    headers += '<th>Midpoint Risk</th><th>Midpoint Details</th>';
                }

                div.innerHTML =
                    '<h2>' + slide.title + '</h2>' +
                    '<div class="table-wrap"><table>' +
                    '<thead><tr>' + headers + '</tr></thead>' +
                    '<tbody>' + rows + '</tbody>' +
                    '</table></div>';

                $deck.appendChild(div);
            }

            total = 1 + slides.length;
            $empty.hidden = true;
            if (activeView === 'slides') $nav.hidden = false;
            show(0);
        }

        /* ── Render DOC view ────────────────────────────────────── */
        function renderDoc(sections, docLinkBase) {
            var today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            var html = '';

            /* Document header: title, author, date */
            html += '<header class="doc-header">';
            html += '<h1 class="doc-title" contenteditable="true" placeholder="Report Title"></h1>';
            html += '<div class="doc-meta">';
            html += '<span class="doc-author" contenteditable="true" placeholder="Author">' + '</span>';
            html += '<span class="doc-date">' + today + '</span>';
            html += '</div>';
            html += '</header>';

            /* Section 1: Workstream Overview (editable) */
            html += '<section class="doc-section">';
            html += '<h2>1. Workstream Overview</h2>';
            html += '<div class="editable doc-edit" contenteditable="true" ' +
                    'placeholder="Write your executive summary here…"></div>';
            html += '</section>';

            /* Section 2: Priorities (card-based) */
            html += '<section class="doc-section">';
            html += '<h2>2. Priorities</h2>';
            html += '<div id="priorityCards" class="priority-grid"></div>';
            html += '<button type="button" id="addPriority" class="add-card-btn" title="Add priority">+ Add Priority</button>';
            html += '</section>';

            /* Section 3: Workstream Preview (from ADO data) */
            html += '<section class="doc-section">';
            html += '<h2>3. Workstream Preview</h2>';

            for (var si = 0; si < sections.length; si++) {
                var sec = sections[si];
                html += '<div class="doc-objective">';
                html += '<h3>' + sec.objectiveTitle + '</h3>';

                for (var gi = 0; gi < sec.groups.length; gi++) {
                    var grp = sec.groups[gi];
                    html += '<h4>' + grp.title + '</h4>';
                    html += '<dl class="group-meta">';
                    html += '<div><dt>DRI</dt><dd>' + (grp.dri || '&mdash;') + '</dd></div>';
                    html += '<div><dt>Original Estimate</dt><dd>' + (grp.originalEstimate || '&mdash;') + '</dd></div>';
                    html += '<div><dt>Comments</dt><dd>' + (grp.comments || '&mdash;') + '</dd></div>';
                    html += '</dl>';

                    if (grp.items.length === 0) {
                        html += '<p class="doc-no-items">No child work items</p>';
                    } else {
                        html += '<table class="doc-table"><thead><tr>' +
                                '<th>Title</th><th>DRI</th><th>Original Estimate</th>' +
                                '</tr></thead><tbody>';
                        for (var ii = 0; ii < grp.items.length; ii++) {
                            var it = grp.items[ii];
                            html += '<tr>';
                            html += '<td><a href="' + docLinkBase + it.id + '" target="_blank">' + it.title + '</a></td>';
                            html += '<td>' + it.dri + '</td>';
                            html += '<td>' + (it.originalEstimate || '&mdash;') + '</td>';
                            html += '</tr>';
                        }
                        html += '</tbody></table>';
                    }
                }
                html += '</div>';
            }

            html += '</section>';

            $docContent.innerHTML = html;

            /* Wire up priority card add/remove */
            var $grid = document.getElementById('priorityCards');
            document.getElementById('addPriority').addEventListener('click', function () {
                addPriorityCard($grid);
            });
        }

        function addPriorityCard(container, title, desc) {
            var card = document.createElement('div');
            card.className = 'priority-card';
            card.innerHTML =
                '<button type="button" class="card-remove" title="Remove">&times;</button>' +
                '<div class="card-title" contenteditable="true" placeholder="Priority title\u2026">' + (title || '') + '</div>' +
                '<div class="card-desc doc-edit" contenteditable="true" placeholder="Description\u2026">' + (desc || '') + '</div>';

            card.querySelector('.card-remove').addEventListener('click', function () {
                card.remove();
            });

            container.appendChild(card);
            /* Focus the title of the new card */
            card.querySelector('.card-title').focus();
        }

        /* ── Fetch data on Run ──────────────────────────────────── */
        document.getElementById('configForm').onsubmit = async function (e) {
            e.preventDefault();
            var url = $query.value.trim();
            if (!url) return;
            localStorage.setItem('ar_query', url);

            var midDate = $midDate.value || '';
            localStorage.setItem('ar_middate', midDate);

            $run.disabled = true;
            $run.textContent = 'Loading…';
            $loading.hidden = false;

            try {
                /* Always fetch both so toggling views is instant */
                var slidePayload = { queryUrl: url };
                if (midDate) slidePayload.midpointDate = midDate;

                var [slideRes, docRes] = await Promise.all([
                    fetch('/api/slides', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(slidePayload)
                    }),
                    fetch('/api/doc', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ queryUrl: url })
                    })
                ]);

                var slideData = await slideRes.json();
                var docData   = await docRes.json();

                if (slideData.error) throw new Error(slideData.error);
                if (docData.error)   throw new Error(docData.error);

                linkBase    = slideData.linkBase || 'https://microsoft.visualstudio.com/Edge/_workitems/edit/';
                hasMidpoint = !!slideData.hasMidpoint;
                lastSlides  = slideData.slides;

                renderSlides(slideData.slides);
                renderDoc(docData.sections, docData.linkBase || linkBase);
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                $run.disabled = false;
                $run.textContent = '\u25B6 Run';
                $loading.hidden = true;
            }
        };
    </script>

</body>
</html>
