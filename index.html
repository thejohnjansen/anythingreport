<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anything Report</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ── Toolbar ─────────────────────────────────────────────── -->
    <header>
        <span class="logo">Anything Report</span>
        <div class="view-toggle">
            <button class="view-btn active" data-view="slides">Slides</button>
            <button class="view-btn" data-view="retro">Retro</button>
            <button class="view-btn" data-view="doc">Doc</button>
        </div>
        <form id="configForm">
            <input type="text" id="queryUrl"
                   placeholder="Paste ADO query URL…" required>
            <input type="date" id="midpointDate"
                   title="Midpoint date (optional) — snapshot risk fields from this date">
            <div class="run-controls">
                <button type="submit" id="runBtn">&#9654; Run</button>
            </div>
            <label class="flat-view-label flat-view-under-run" title="Uncheck to view by Mission"><input type="checkbox" id="flatViewCheck" checked> Team View?</label>
            <button type="button" id="pptxBtn" hidden title="Download as PowerPoint">&#8595; PPTX</button>
        </form>
    </header>

    <!-- ── Slide deck ──────────────────────────────────────────── -->
    <main id="deck">
        <div id="empty">
            Paste an Azure DevOps query URL above and click
            <strong>Run</strong> to generate your report.
        </div>
        <div id="loading" hidden><div class="spinner"></div></div>
    </main>

    <!-- ── Navigation (slides) ─────────────────────────────────── -->
    <nav id="slideNav" hidden>
        <button id="prev" title="Previous (←)">&#9664;</button>
        <span id="counter"></span>
        <button id="next" title="Next (→)">&#9654;</button>
    </nav>

    <!-- ── Retro view ───────────────────────────────────────────── -->
    <div id="retroView" class="retro-view" hidden>
        <div id="retroContent" class="retro-content">
            <div id="retroEmpty" class="doc-empty">
                Paste an Azure DevOps query URL above and click
                <strong>Run</strong> to generate the retro.
            </div>
        </div>
    </div>

    <!-- ── Doc view ────────────────────────────────────────────── -->
    <div id="docView" class="doc-view" hidden>
        <div id="docContent" class="doc-content">
            <div id="docEmpty" class="doc-empty">
                Paste an Azure DevOps query URL above and click
                <strong>Run</strong> to generate the document.
            </div>
        </div>
    </div>

    <!-- ── Floating formatting toolbar (shared, positioned near focused editable) ── -->
    <div id="fmtBar" class="fmt-bar" hidden>
        <button type="button" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button type="button" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button type="button" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
        <span class="fmt-sep"></span>
        <select id="fontSelect" class="fmt-select" title="Font family">
            <option value="">Font</option>
            <option value="Segoe UI">Segoe UI</option>
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Verdana">Verdana</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
            <option value="Trebuchet MS">Trebuchet MS</option>
            <option value="Impact">Impact</option>
        </select>
        <select id="fontSizeSelect" class="fmt-select" title="Font size">
            <option value="">Size</option>
            <option value="1">8pt</option>
            <option value="2">10pt</option>
            <option value="3">12pt</option>
            <option value="4">14pt</option>
            <option value="5">18pt</option>
            <option value="6">24pt</option>
            <option value="7">36pt</option>
        </select>
        <span class="fmt-sep"></span>
        <button type="button" id="linkBtn" title="Create link">Link</button>
        <span class="fmt-sep"></span>
        <button type="button" data-cmd="insertUnorderedList" title="Bullet list">&#8226; List</button>
        <button type="button" data-cmd="insertOrderedList" title="Numbered list">1. List</button>
        <button type="button" data-cmd="outdent" title="Outdent (Shift+Tab or Ctrl+[)">&#8592; Outdent</button>
        <button type="button" data-cmd="indent" title="Indent (Tab or Ctrl+])">&#8594; Indent</button>
    </div>

    <script>
        /* ── State ──────────────────────────────────────────────── */
        let total   = 0;
        let current = 0;
        let linkBase = '';
        let hasMidpoint = false;
        let activeView = 'slides';          // 'slides' | 'retro' | 'doc'
        let lastSlides = null;              // cache for view switches
        let flatView = localStorage.getItem('ar_flatview') === 'true';
        let baseSlideTitle = 'Layout';
        let baseTeamName = localStorage.getItem('ar_team_name') || '';
        let deckFileName = 'anything-report';
        let cycleNumber = localStorage.getItem('ar_cycle_number') || '';

        const $deck    = document.getElementById('deck');
        const $nav     = document.getElementById('slideNav');
        const $counter = document.getElementById('counter');
        const $empty   = document.getElementById('empty');
        const $loading = document.getElementById('loading');
        const $query   = document.getElementById('queryUrl');
        const $midDate = document.getElementById('midpointDate');
        const $run     = document.getElementById('runBtn');
        const $docView = document.getElementById('docView');
        const $docContent = document.getElementById('docContent');
        const $docEmpty   = document.getElementById('docEmpty');
        const $retroView    = document.getElementById('retroView');
        const $retroContent = document.getElementById('retroContent');
        const $retroEmpty   = document.getElementById('retroEmpty');
        const $fmtBar     = document.getElementById('fmtBar');
        const $pptxBtn    = document.getElementById('pptxBtn');

        /* Restore saved inputs */
        $query.value   = localStorage.getItem('ar_query') || '';
        $midDate.value = localStorage.getItem('ar_middate') || '';
        document.getElementById('flatViewCheck').checked = flatView;

        /* ── Board API (Cosmos via Azure Functions proxy) ───────── */
        var currentUser = 'unknown';
        var boardVersions = {};   // key "type:teamSlug" → version number

        async function initBoardConfig() {
            try {
                var cfg = await fetch('/api/config').then(function(r) { return r.json(); });
                currentUser = cfg.currentUser || 'unknown';
            } catch (e) {
                console.warn('Could not load /api/config:', e);
            }
        }

        function teamSlugFromName(name) {
            return (name || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'default';
        }

        function storageKeyToTeamSlug(storageKey) {
            var prefix = 'ar_pipeline_team_';
            if (!storageKey || storageKey === 'ar_pipeline') return teamSlugFromName(baseTeamName);
            if (storageKey.startsWith(prefix)) return storageKey.slice(prefix.length) || 'default';
            return 'default';
        }

        async function boardGet(boardType, teamSlug) {
            try {
                var r = await fetch('/api/board?type=' + boardType + '&teamSlug=' + encodeURIComponent(teamSlug || 'default'));
                var data = await r.json();
                return data.document || null;
            } catch (e) {
                console.warn('boardGet failed:', e);
                return null;
            }
        }

        async function boardPut(boardType, teamSlug, content, expectedVersion) {
            try {
                var r = await fetch('/api/board', {
                    method: 'PUT',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({
                        boardType: boardType,
                        teamSlug: teamSlug || 'default',
                        content: content,
                        lastEditedBy: currentUser,
                        expectedVersion: typeof expectedVersion === 'number' ? expectedVersion : undefined
                    })
                });
                var data = await r.json();
                if (r.status === 409) {
                    console.warn('Board version conflict — another user saved first.');
                    return { conflict: true, currentDocument: data.currentDocument };
                }
                if (data.document) {
                    boardVersions[boardType + ':' + (teamSlug || 'default')] = data.document.version;
                }
                return data.document || null;
            } catch (e) {
                console.warn('boardPut failed:', e);
                return null;
            }
        }

        /* Debounce helper */
        function debounce(fn, ms) {
            var t;
            return function() {
                var args = arguments;
                clearTimeout(t);
                t = setTimeout(function() { fn.apply(null, args); }, ms);
            };
        }

        /* ── Collaborative polling ───────────────────────────────── */
        var pollTimer = null;

        function startCollaborativePolling() {
            if (pollTimer) return;
            pollTimer = setInterval(pollBoardUpdates, 30000);
        }

        async function pollBoardUpdates() {
            var teamSlug = teamSlugFromName(baseTeamName);

            /* Poll Top of Mind */
            var tomKey = 'topofmind:' + teamSlug;
            var tomDoc = await boardGet('topofmind', teamSlug);
            if (tomDoc && tomDoc.version > (boardVersions[tomKey] || 0)) {
                boardVersions[tomKey] = tomDoc.version;
                /* Only update if the user is not currently editing TOM */
                var $tom = document.getElementById('tom');
                if ($tom && document.activeElement !== $tom) {
                    localStorage.setItem('ar_tom', tomDoc.content);
                    $tom.innerHTML = tomDoc.content;
                    showBoardUpdateBadge('tom', tomDoc.lastEditedBy, tomDoc.lastEditedAt);
                }
            }

            /* Poll pipeline for current team */
            var plKey = 'pipeline:' + teamSlug;
            var plDoc = await boardGet('pipeline', teamSlug);
            if (plDoc && plDoc.version > (boardVersions[plKey] || 0)) {
                boardVersions[plKey] = plDoc.version;
                try {
                    var pl = JSON.parse(plDoc.content);
                    localStorage.setItem('ar_pipeline', JSON.stringify(pl));
                    refreshPipelineVisualization('ar_pipeline', pl);
                } catch (e) { /* ignore parse errors */ }
            }
        }

        function showBoardUpdateBadge(context, editedBy, editedAt) {
            var existing = document.getElementById('board-update-badge-' + context);
            if (existing) existing.remove();
            var badge = document.createElement('div');
            badge.id = 'board-update-badge-' + context;
            badge.style.cssText = 'position:fixed;bottom:1rem;right:1rem;background:#1d4ed8;color:#fff;padding:.4rem .8rem;border-radius:.4rem;font-size:.8rem;z-index:9999;opacity:0.95;';
            var when = editedAt ? new Date(editedAt).toLocaleTimeString() : '';
            badge.textContent = '\u2139\uFE0F Updated by ' + editedBy + (when ? ' at ' + when : '');
            document.body.appendChild(badge);
            setTimeout(function() { badge.remove(); }, 5000);
        }

        function refreshPipelineVisualization(storageKey, pl) {
            document.querySelectorAll('.slide-pipeline').forEach(function(slide) {
                if (slide.dataset.storageKey !== storageKey) return;
                var viz = slide.querySelector('.pl-viz');
                if (!viz) return;
                viz.innerHTML = plVizHTML(pl);
                plWireupVizRows(slide, storageKey);
            });
        }

        document.getElementById('flatViewCheck').addEventListener('change', function () {
            flatView = this.checked;
            localStorage.setItem('ar_flatview', flatView);
        });

        /* ── View toggle ────────────────────────────────────────── */
        document.querySelectorAll('.view-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var view = btn.dataset.view;
                if (view === activeView) return;
                activeView = view;

                document.querySelectorAll('.view-btn').forEach(function (b) {
                    b.classList.toggle('active', b.dataset.view === view);
                });

                $deck.hidden      = (view !== 'slides');
                $nav.hidden       = (view !== 'slides') || total === 0;
                $retroView.hidden = (view !== 'retro');
                $docView.hidden   = (view !== 'doc');
            });
        });

        /* ── Formatting toolbar (floats near focused editable) ── */
        document.querySelectorAll('#fmtBar button').forEach(function (btn) {
            btn.addEventListener('mousedown', function (e) {
                e.preventDefault();
                document.execCommand(btn.dataset.cmd, false, null);
            });
        });

        /* Font selector */
        var $fontSelect = document.getElementById('fontSelect');
        $fontSelect.addEventListener('mousedown', function (e) {
            e.stopPropagation();
        });
        $fontSelect.addEventListener('change', function (e) {
            if (e.target.value) {
                document.execCommand('fontName', false, e.target.value);
                /* Keep showing the selected font */
            }
        });

        /* Font size selector */
        var $fontSizeSelect = document.getElementById('fontSizeSelect');
        $fontSizeSelect.addEventListener('mousedown', function (e) {
            e.stopPropagation();
        });
        $fontSizeSelect.addEventListener('change', function (e) {
            if (e.target.value) {
                document.execCommand('fontSize', false, e.target.value);
                /* Keep showing the selected size */
            }
        });

        /* Link button */
        document.getElementById('linkBtn').addEventListener('mousedown', function (e) {
            e.preventDefault();
            var url = prompt('Enter the URL:');
            if (url) {
                document.execCommand('createLink', false, url);
            }
        });

        /* Show toolbar above whichever .doc-edit is focused */
        function positionToolbar(editEl) {
            var rect = editEl.getBoundingClientRect();
            $fmtBar.hidden = false;
            $fmtBar.style.top  = (rect.top + window.scrollY - $fmtBar.offsetHeight - 4) + 'px';
            $fmtBar.style.left = rect.left + 'px';
            $fmtBar.style.width = rect.width + 'px';
        }

        document.addEventListener('focusin', function (e) {
            if (e.target.classList.contains('doc-edit')) {
                positionToolbar(e.target);
            }
        });
        document.addEventListener('focusout', function (e) {
            if (e.target.classList.contains('doc-edit')) {
                /* Delay so toolbar button clicks register first */
                setTimeout(function () {
                    var active = document.activeElement;
                    /* Don't hide if focus moved to toolbar or its children */
                    if (!active || (!active.classList.contains('doc-edit') && !$fmtBar.contains(active))) {
                        $fmtBar.hidden = true;
                    }
                }, 50);
            }
        });

        /* Reposition on scroll inside doc content */
        document.getElementById('docContent').addEventListener('scroll', function () {
            var focused = document.querySelector('.doc-edit:focus');
            if (focused) positionToolbar(focused);
        });

        function selectionContainerElement() {
            var sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return null;
            var node = sel.anchorNode;
            if (!node) return null;
            return node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        }

        function isSelectionInListItem() {
            var el = selectionContainerElement();
            return !!(el && el.closest('li'));
        }

        function applyListIndent(outdent) {
            if (!isSelectionInListItem()) return;
            document.execCommand(outdent ? 'outdent' : 'indent', false, null);
        }

        // Rich-text keyboard behavior:
        // - Tab/Shift+Tab nests list levels instead of moving focus away.
        // - Ctrl+]/Ctrl+[ provide explicit indent/outdent shortcuts.
        // - Esc or Ctrl+Enter exits the editor so Tab can navigate controls.
        document.addEventListener('keydown', function (e) {
            var target = e.target;
            if (!target || !target.classList || !target.classList.contains('doc-edit')) return;

            if (e.key === 'Tab') {
                e.preventDefault();
                applyListIndent(!!e.shiftKey);
                return;
            }

            if (e.ctrlKey && e.key === ']') {
                e.preventDefault();
                applyListIndent(false);
                return;
            }

            if (e.ctrlKey && e.key === '[') {
                e.preventDefault();
                applyListIndent(true);
                return;
            }

            if (e.key === 'Escape' || (e.ctrlKey && e.key === 'Enter')) {
                e.preventDefault();
                target.blur();
                $fmtBar.hidden = true;
            }
        });

        /* ── Slide navigation ───────────────────────────────────── */
        function show(i) {
            current = Math.max(0, Math.min(i, total - 1));
            $deck.querySelectorAll('.slide').forEach(
                (s, idx) => s.classList.toggle('active', idx === current)
            );
            $counter.textContent = (current + 1) + ' / ' + total;
        }

        document.getElementById('prev').onclick = () => show(current - 1);
        document.getElementById('next').onclick = () => show(current + 1);
        document.addEventListener('keydown', function (e) {
            if (activeView !== 'slides') return;
            if (e.target.closest('.editable')) return;
            if (e.key === 'ArrowLeft')  show(current - 1);
            if (e.key === 'ArrowRight') show(current + 1);
        });

        /* ── Risk badge (pure string) ───────────────────────────── */
        function badge(risk) {
            var r = (risk || '').toLowerCase();
            if (r.includes('on track'))  return '<span class="risk on-track">&#10004; On Track</span>';
            if (r.includes('at risk'))   return '<span class="risk at-risk">&#9888; At Risk</span>';
            if (r.includes('off track')) return '<span class="risk off-track">&#10008; Off Track</span>';
            return '<span class="risk unknown">&mdash;</span>';
        }

        /* ── Pipeline helpers ────────────────────────────────────── */
        var PL_STAGES  = ['Investigate','Explainer / Design Doc','Implementation','Dev Trial','Origin Trial / CFR','Ship'];
        var PL_HEADERS = ['INVESTIGATE','EXPLAINER/<br>DESIGN DOC','IMPLEMENTATION','DEV TRIAL','ORIGIN TRIAL/<br>CFR','SHIP'];
        var DEFAULT_PIPELINE_TITLE = 'Pipeline';

        function escapeHtml(s) {
            return String(s || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function titleHtmlWithTeam(prefix) {
            var p = escapeHtml(prefix);
            var team = (baseTeamName || '').trim();
            if (!team) return p + ' <span class="title-hint">Team Name will be populated automatically</span>';
            return p + ' - ' + escapeHtml(team);
        }

        function normalizePipelineTitle(title) {
            var t = (title || '').trim();
            if (!t || t === 'Pipeline') return DEFAULT_PIPELINE_TITLE;
            return t;
        }

        function extractTeamNameFromSlideTitle(title) {
            var t = String(title || '').trim();
            var sep = t.indexOf(' - ');
            if (sep >= 0) return t.slice(sep + 3).trim() || t;
            return t;
        }

        function teamPipelineStorageKey(teamName) {
            var slug = String(teamName || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            return 'ar_pipeline_team_' + (slug || 'default');
        }

        function teamPipelineTitle(teamName) {
            var t = String(teamName || '').trim();
            return t ? ('Pipeline - ' + t) : DEFAULT_PIPELINE_TITLE;
        }

        /* Returns the list of known flat-team names, preferring the saved list
           but falling back to scanning localStorage for ar_pipeline_team_* keys
           (which exist from previous runs even before ar_flat_team_names was added). */
        function getStoredFlatTeamNames() {
            var saved = localStorage.getItem('ar_flat_team_names');
            if (saved) {
                try {
                    var parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                } catch(e) {}
            }
            /* Fallback: scan for ar_pipeline_team_* keys and read team name from title */
            var teams = [];
            for (var _i = 0; _i < localStorage.length; _i++) {
                var _k = localStorage.key(_i);
                if (_k && _k.indexOf('ar_pipeline_team_') === 0) {
                    try {
                        var _d = JSON.parse(localStorage.getItem(_k));
                        if (_d && _d.title) {
                            var _tn = extractTeamNameFromSlideTitle(_d.title);
                            if (_tn && _tn !== DEFAULT_PIPELINE_TITLE) teams.push(_tn);
                        }
                    } catch(e) {}
                }
            }
            return teams.length > 0 ? teams : null;
        }

        function buildPipelinePlaceholders(rowCount) {
            var rows = [];
            for (var i = 0; i < rowCount; i++) {
                rows.push({
                    topic: '',
                    stages: ['', '', '', '', '', ''],
                    hereCol: -1,
                    warnCol: -1,
                    readonlyTopic: false
                });
            }
            return rows;
        }

        function plLoad(storageKey) {
            var key = storageKey || 'ar_pipeline';
            try {
                var pl = JSON.parse(localStorage.getItem(key));
                if (!pl || typeof pl !== 'object') return null;
                pl.title = normalizePipelineTitle(pl.title);
                return pl;
            } catch(e) {
                return null;
            }
        }
        function plSave(d, storageKey) {
            var key = storageKey || 'ar_pipeline';
            localStorage.setItem(key, JSON.stringify(d));
            var teamSlug = storageKeyToTeamSlug(key);
            var boardKey = 'pipeline:' + teamSlug;
            boardPut('pipeline', teamSlug, JSON.stringify(d), boardVersions[boardKey]);
        }

        function normalizePipelineStageValue(value) {
            var v = (value || '').trim();
            var lower = v.toLowerCase();
            if (lower === 'complete' || lower === 'completed') return 'complete';
            return v;
        }

        function parsePipelineStageValue(value) {
            var raw = (value || '').trim();
            if (!raw) return { complete: false, committed: false, label: '' };

            var lower = raw.toLowerCase();
            if (lower === 'complete' || lower === 'completed') {
                return { complete: true, committed: false, label: '' };
            }

            if (lower.indexOf('complete|') === 0 || lower.indexOf('completed|') === 0) {
                var pipeIndex = raw.indexOf('|');
                var label = pipeIndex >= 0 ? raw.slice(pipeIndex + 1).trim() : '';
                return { complete: true, committed: false, label: label };
            }

            if (lower === 'committed' || lower === 'commit') {
                return { complete: false, committed: true, label: '' };
            }

            if (lower.indexOf('committed|') === 0 || lower.indexOf('commit|') === 0) {
                var pipeIndexCommitted = raw.indexOf('|');
                var committedLabel = pipeIndexCommitted >= 0 ? raw.slice(pipeIndexCommitted + 1).trim() : '';
                return { complete: false, committed: true, label: committedLabel };
            }

            return { complete: false, committed: false, label: normalizePipelineStageValue(raw) };
        }

        function plVizHTML(pl) {
            if (!pl || !pl.rows || !pl.rows.length)
                return '<p class="pv-empty">Click <b>+ Add Row</b> below to add pipeline rows.</p>';
            var h = '<div class="pv-legend">' +
                '<span class="pv-leg"><span class="pv-leg-arrow">&#11015;</span> Roughly &ldquo;Where we are&rdquo;</span>' +
                '<span class="pv-leg"><span class="pv-leg-circ complete"></span> Completed</span>' +
                '<span class="pv-leg"><span class="pv-leg-circ committed"></span> Committed for current cycle</span>' +
                '<span class="pv-leg"><span class="pv-leg-circ future"></span> Planned for future cycle</span></div>';
            h += '<div class="pv-chart"><div class="pv-header-row"><div class="pv-corner"></div>';
            for (var i = 0; i < PL_HEADERS.length; i++) h += '<div class="pv-col-hdr">' + PL_HEADERS[i] + '</div>';
            h += '</div>';
            for (var r = 0; r < pl.rows.length; r++) {
                var row = pl.rows[r];
                h += '<div class="pv-row"><div class="pv-topic"><span>' + escapeHtml(row.topic || '') + '</span>' +
                    '<div class="pv-topic-actions">' +
                    '<button type="button" class="pv-row-btn pv-row-btn--edit" data-row="' + r + '">Edit</button>' +
                    '<button type="button" class="pv-row-btn pv-row-btn--delete" data-row="' + r + '">Delete</button>' +
                    '</div></div>';
                h += '<div class="pv-stages"><div class="pv-line"></div>';
                for (var c = 0; c < 6; c++) {
                    var parsed = parsePipelineStageValue(row.stages && row.stages[c] || '');
                    var v = parsed.label;
                    var here = (row.hereCol === c);
                    var warn = (row.warnCol === c);
                    var done = parsed.complete;
                    var committedMark = !!parsed.committed;
                    var empty = (!done && !committedMark && v === '');
                    h += '<div class="pv-cell">';
                    if (here) h += '<div class="pv-arrow">&#11015;</div>';
                    if (warn) h += '<div class="pv-warn" title="Watch item">&#9888;&#65039;</div>';
                    var isChanged = !!(v && row.changedLabels && row.changedLabels[c]);
                    if (done) {
                        h += '<div class="pv-node complete' + (v ? ' labeled' : '') + (isChanged ? ' changed' : '') + '">' + (v || '') + '</div>';
                    } else if (!empty) {
                        var cls = committedMark ? 'committed' : 'future';
                        h += '<div class="pv-node ' + cls + (isChanged ? ' changed' : '') + '">' + v + '</div>';
                    }
                    h += '</div>';
                }
                h += '</div></div>';
            }
            h += '</div>';
            return h;
        }

        async function plFetchRows(queryUrl) {
            var res = await fetch('/api/pipeline', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ queryUrl: queryUrl })
            });
            var data = await res.json();
            if (!res.ok || data.error) throw new Error(data.error || 'Failed to load pipeline titles');
            return {
                rows: data.rows || [],
                diagnostics: data.diagnostics || null
            };
        }

        function plTopicKey(topic) {
            return (topic || '').trim().toLowerCase();
        }

        function plMergeRowsByTopic(existingRows, fetchedRows) {
            var existingByTopic = new Map();
            existingRows.forEach(function (row) {
                existingByTopic.set(plTopicKey(row.topic), row);
            });

            return fetchedRows.map(function (row) {
                var existing = existingByTopic.get(plTopicKey(row.topic));
                if (!existing) return row;
                return {
                    topic: row.topic,
                    stages: existing.stages || ['', '', '', '', '', ''],
                    hereCol: existing.hereCol ?? -1,
                    warnCol: existing.warnCol ?? -1,
                    readonlyTopic: true
                };
            });
        }

        /* ── Pipeline Drawer ──────────────────────────────────────── */
        var _plDrawer = null; // { bd, dr, ctx }

        function plEnsureDrawer() {
            if (_plDrawer) return _plDrawer;
            var bd = document.createElement('div');
            bd.className = 'pl-drawer-backdrop';
            document.body.appendChild(bd);
            var dr = document.createElement('aside');
            dr.className = 'pl-drawer';
            dr.setAttribute('role', 'dialog');
            dr.setAttribute('aria-modal', 'true');
            dr.innerHTML =
                '<div class="pl-drawer-header">' +
                '<h3 class="pl-drawer-title" id="plDrawerTitle">Edit Row</h3>' +
                '<button type="button" class="pl-drawer-x" id="plDrawerX" aria-label="Close">\u2715</button>' +
                '</div>' +
                '<div class="pl-drawer-body" id="plDrawerBody"></div>' +
                '<div class="pl-drawer-footer">' +
                '<button type="button" class="pl-drawer-btn pl-drawer-btn-primary" id="plDrawerSave">Save</button>' +
                '<button type="button" class="pl-drawer-btn pl-drawer-btn-secondary" id="plDrawerCancel">Cancel</button>' +
                '<button type="button" class="pl-drawer-btn pl-drawer-btn-danger" id="plDrawerDelete">Delete</button>' +
                '</div>';
            document.body.appendChild(dr);
            bd.addEventListener('click', plCloseDrawer);
            dr.querySelector('#plDrawerX').addEventListener('click', plCloseDrawer);
            dr.querySelector('#plDrawerCancel').addEventListener('click', plCloseDrawer);
            dr.querySelector('#plDrawerSave').addEventListener('click', plSaveDrawer);
            dr.querySelector('#plDrawerDelete').addEventListener('click', plDeleteDrawerRow);
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && _plDrawer && _plDrawer.ctx) plCloseDrawer();
            });
            _plDrawer = { bd: bd, dr: dr, ctx: null };
            return _plDrawer;
        }

        function plBuildDrawerForm(row) {
            var r = row || { topic: '', stages: ['','','','','',''], hereCol: -1, warnCol: -1, readonlyTopic: false };
            var isReadonly = !!r.readonlyTopic;
            var h = '<div class="pl-form">';
            // Topic
            h += '<div class="pl-field">';
            h += '<label class="pl-field-label" for="plFTopic">Topic</label>';
            if (isReadonly) {
                h += '<div class="pl-topic-readonly">' + escapeHtml(r.topic) + '</div>';
                h += '<input type="hidden" id="plFTopic" value="' + escapeHtml(r.topic).replace(/"/g, '&quot;') + '">';
            } else {
                h += '<input type="text" id="plFTopic" class="pl-input" value="' + escapeHtml(r.topic).replace(/"/g, '&quot;') + '" placeholder="Topic name" autocomplete="off">';
                h += '<div class="pl-input-error-msg" id="plFTopicErr" hidden>Topic name is required.</div>';
            }
            h += '</div>';
            // Current Stage
            h += '<div class="pl-field">';
            h += '<label class="pl-field-label" for="plFHere">Current Stage <span class="pl-field-hint">Shows &#11015; &ldquo;here&rdquo; arrow</span></label>';
            h += '<select id="plFHere" class="pl-select">';
            h += '<option value="-1"' + (r.hereCol < 0 ? ' selected' : '') + '>\u2014 None \u2014</option>';
            for (var i = 0; i < PL_STAGES.length; i++) {
                h += '<option value="' + i + '"' + (r.hereCol === i ? ' selected' : '') + '>' + escapeHtml(PL_STAGES[i]) + '</option>';
            }
            h += '</select></div>';
            // Watch Stage
            h += '<div class="pl-field">';
            h += '<label class="pl-field-label" for="plFWarn">Watch Stage <span class="pl-field-hint">Shows &#9888; warning marker</span></label>';
            h += '<select id="plFWarn" class="pl-select">';
            h += '<option value="-1"' + ((r.warnCol === undefined || r.warnCol < 0) ? ' selected' : '') + '>\u2014 None \u2014</option>';
            for (var j = 0; j < PL_STAGES.length; j++) {
                h += '<option value="' + j + '"' + (r.warnCol === j ? ' selected' : '') + '>' + escapeHtml(PL_STAGES[j]) + '</option>';
            }
            h += '</select></div>';
            // Stages
            h += '<div class="pl-section">Stages</div>';
            for (var s = 0; s < PL_STAGES.length; s++) {
                var parsed = parsePipelineStageValue(r.stages[s] || '');
                h += '<div class="pl-stage-block">';
                h += '<div class="pl-stage-block-title">' + escapeHtml(PL_STAGES[s]) + '</div>';
                h += '<div class="pl-field pl-field--inline">';
                h += '<label class="pl-checkbox-label"><input type="checkbox" class="pl-cb-complete" data-s="' + s + '"' + (parsed.complete ? ' checked' : '') + '> Completed</label>';
                h += '<label class="pl-checkbox-label"><input type="checkbox" class="pl-cb-committed" data-s="' + s + '"' + (parsed.committed ? ' checked' : '') + '> Committed</label>';
                h += '</div>';
                h += '<div class="pl-field">';
                h += '<label class="pl-field-label" for="plFS' + s + '">Cycle label <span class="pl-field-hint">e.g. 26C4</span></label>';
                h += '<input type="text" class="pl-input pl-stage-label" data-s="' + s + '" id="plFS' + s + '" value="' + (parsed.label || '').replace(/"/g, '&quot;') + '" placeholder="Cycle label\u2026" autocomplete="off">';
                h += '</div></div>';
            }
            h += '</div>';
            return h;
        }

        function plOpenDrawer(opts) {
            var d = plEnsureDrawer();
            d.ctx = opts;
            var isAdding = opts.rowIndex === null || opts.rowIndex === undefined;
            var pl = plLoad(opts.storageKey) || { rows: [] };
            var row = isAdding ? null : (pl.rows[opts.rowIndex] || null);
            d.dr.querySelector('#plDrawerTitle').textContent = isAdding ? 'Add Row' : 'Edit Row';
            d.dr.querySelector('#plDrawerDelete').hidden = isAdding;
            d.dr.querySelector('#plDrawerBody').innerHTML = plBuildDrawerForm(row);
            var body = d.dr.querySelector('#plDrawerBody');
            body.querySelectorAll('.pl-cb-complete').forEach(function(cb) {
                cb.addEventListener('change', function() {
                    if (cb.checked) {
                        var comm = body.querySelector('.pl-cb-committed[data-s="' + cb.dataset.s + '"]');
                        if (comm) comm.checked = false;
                    }
                });
            });
            body.querySelectorAll('.pl-cb-committed').forEach(function(cb) {
                cb.addEventListener('change', function() {
                    if (cb.checked) {
                        var comp = body.querySelector('.pl-cb-complete[data-s="' + cb.dataset.s + '"]');
                        if (comp) comp.checked = false;
                    }
                });
            });
            d.bd.classList.add('pl-drawer-backdrop--open');
            d.dr.classList.add('pl-drawer--open');
            var first = d.dr.querySelector('#plFTopic');
            if (first && first.type !== 'hidden') setTimeout(function() { first.focus(); }, 50);
        }

        function plCloseDrawer() {
            if (!_plDrawer) return;
            _plDrawer.ctx = null;
            _plDrawer.bd.classList.remove('pl-drawer-backdrop--open');
            _plDrawer.dr.classList.remove('pl-drawer--open');
        }

        function plSaveDrawer() {
            if (!_plDrawer || !_plDrawer.ctx) return;
            var ctx = _plDrawer.ctx;
            var body = _plDrawer.dr.querySelector('#plDrawerBody');
            var topicInput = body.querySelector('#plFTopic');
            var topicErr = body.querySelector('#plFTopicErr');
            var topic = topicInput ? topicInput.value.trim() : '';
            if (!topic) {
                if (topicInput && topicInput.type !== 'hidden') topicInput.classList.add('pl-input--error');
                if (topicErr) topicErr.hidden = false;
                return;
            }
            if (topicInput) topicInput.classList.remove('pl-input--error');
            if (topicErr) topicErr.hidden = true;
            var hereCol = parseInt(body.querySelector('#plFHere').value, 10);
            var warnCol = parseInt(body.querySelector('#plFWarn').value, 10);
            var stages = [];
            for (var s = 0; s < 6; s++) {
                var completeCb = body.querySelector('.pl-cb-complete[data-s="' + s + '"]');
                var committedCb = body.querySelector('.pl-cb-committed[data-s="' + s + '"]');
                var labelInput = body.querySelector('.pl-stage-label[data-s="' + s + '"]');
                var lbl = normalizePipelineStageValue(labelInput ? labelInput.value : '');
                if (completeCb && completeCb.checked) {
                    stages.push(lbl ? ('complete|' + lbl) : 'complete');
                } else if (committedCb && committedCb.checked) {
                    stages.push(lbl ? ('committed|' + lbl) : 'committed');
                } else {
                    stages.push(lbl);
                }
            }
            var pl = plLoad(ctx.storageKey) || { title: DEFAULT_PIPELINE_TITLE, queryUrl: '', rows: [] };
            var isAdding = ctx.rowIndex === null || ctx.rowIndex === undefined;
            var prevRow = isAdding ? null : (pl.rows[ctx.rowIndex] || null);
            var changedLabels = [];
            for (var cl = 0; cl < 6; cl++) {
                var clInput = body.querySelector('.pl-stage-label[data-s="' + cl + '"]');
                var clNew = normalizePipelineStageValue(clInput ? clInput.value : '');
                var clOld = prevRow ? parsePipelineStageValue((prevRow.stages || [])[cl] || '').label : '';
                if (prevRow && clNew !== '') {
                    changedLabels[cl] = clNew !== clOld ? true : !!(prevRow.changedLabels && prevRow.changedLabels[cl]);
                } else {
                    changedLabels[cl] = false;
                }
            }
            var newRow = { topic: topic, stages: stages, hereCol: hereCol, warnCol: warnCol, readonlyTopic: false, changedLabels: changedLabels };
            if (!isAdding) {
                newRow.readonlyTopic = !!((pl.rows[ctx.rowIndex] || {}).readonlyTopic);
                pl.rows[ctx.rowIndex] = newRow;
            } else {
                pl.rows.push(newRow);
            }
            plSave(pl, ctx.storageKey);
            var viz = ctx.slideEl.querySelector('.pl-viz');
            if (viz) {
                viz.innerHTML = plVizHTML(pl);
                plWireupVizRows(ctx.slideEl, ctx.storageKey);
            }
            plCloseDrawer();
            var newIdx = isAdding ? pl.rows.length - 1 : ctx.rowIndex;
            if (viz) {
                var rowEls = viz.querySelectorAll('.pv-row');
                if (rowEls[newIdx]) {
                    rowEls[newIdx].classList.add('pv-row--highlight');
                    setTimeout(function() { rowEls[newIdx].classList.remove('pv-row--highlight'); }, 1500);
                }
            }
        }

        function plDeleteDrawerRow() {
            if (!_plDrawer || !_plDrawer.ctx) return;
            var ctx = _plDrawer.ctx;
            if (ctx.rowIndex === null || ctx.rowIndex === undefined) return;
            if (!confirm('Delete this row?')) return;
            var pl = plLoad(ctx.storageKey) || { title: DEFAULT_PIPELINE_TITLE, queryUrl: '', rows: [] };
            pl.rows.splice(ctx.rowIndex, 1);
            plSave(pl, ctx.storageKey);
            var viz = ctx.slideEl.querySelector('.pl-viz');
            if (viz) {
                viz.innerHTML = plVizHTML(pl);
                plWireupVizRows(ctx.slideEl, ctx.storageKey);
            }
            plCloseDrawer();
        }

        function plWireupVizRows(slideEl, storageKey) {
            var viz = slideEl.querySelector('.pl-viz');
            if (!viz) return;
            viz.querySelectorAll('.pv-row-btn--edit').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    plOpenDrawer({ storageKey: storageKey, rowIndex: parseInt(btn.dataset.row, 10), slideEl: slideEl });
                });
            });
            viz.querySelectorAll('.pv-row-btn--delete').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var rowIndex = parseInt(btn.dataset.row, 10);
                    if (!confirm('Delete this row?')) return;
                    var pl = plLoad(storageKey) || { rows: [] };
                    pl.rows.splice(rowIndex, 1);
                    plSave(pl, storageKey);
                    viz.innerHTML = plVizHTML(pl);
                    plWireupVizRows(slideEl, storageKey);
                });
            });
        }

        function plWireup(slideEl, storageKey) {
            var $viz = slideEl.querySelector('.pl-viz');
            var $ttl = slideEl.querySelector('.pl-title');
            var $query = slideEl.querySelector('.pl-query');
            var $queryRun = slideEl.querySelector('.pl-query-run');
            var $addBtn = slideEl.querySelector('.pl-add-row');

            plWireupVizRows(slideEl, storageKey);

            if ($addBtn) {
                $addBtn.addEventListener('click', function() {
                    plOpenDrawer({ storageKey: storageKey, rowIndex: null, slideEl: slideEl });
                });
            }

            if ($ttl) {
                $ttl.addEventListener('input', function() {
                    var pl = plLoad(storageKey) || { title: DEFAULT_PIPELINE_TITLE, queryUrl: '', rows: [] };
                    pl.title = $ttl.textContent || DEFAULT_PIPELINE_TITLE;
                    plSave(pl, storageKey);
                });
            }

            if ($query) {
                $query.addEventListener('input', function() {
                    var pl = plLoad(storageKey) || { title: DEFAULT_PIPELINE_TITLE, queryUrl: '', rows: [] };
                    pl.queryUrl = $query.value;
                    plSave(pl, storageKey);
                });
            }

            if ($queryRun) {
                $queryRun.addEventListener('click', async function() {
                    var url = $query ? $query.value.trim() : '';
                    if (!url) { alert('Please enter an ADO query URL first.'); return; }
                    try {
                        $queryRun.disabled = true;
                        $queryRun.textContent = 'Syncing\u2026';
                        var result = await plFetchRows(url);
                        if (!result.rows.length) {
                            var d = result.diagnostics;
                            throw new Error(d
                                ? 'No work item titles returned. (WIQL workItems=' + d.wiqlWorkItemsCount + ', fetched=' + d.fetchedWorkItemCount + ')'
                                : 'No work item titles returned from this query.');
                        }
                        var pl = plLoad(storageKey) || { title: DEFAULT_PIPELINE_TITLE, queryUrl: url, rows: [] };
                        pl.queryUrl = url;
                        pl.rows = plMergeRowsByTopic(pl.rows, result.rows);
                        plSave(pl, storageKey);
                        $viz.innerHTML = plVizHTML(pl);
                        plWireupVizRows(slideEl, storageKey);
                    } catch (err) {
                        alert('Error: ' + err.message);
                    } finally {
                        $queryRun.disabled = false;
                        $queryRun.textContent = 'Sync Topics';
                    }
                });
            }
        }

        function createPipelineSlide(opts) {
            var options = opts || {};
            var storageKey = options.storageKey || 'ar_pipeline';
            var teamName = options.teamName || '';
            var useTeamTitle = !!teamName;
            var placeholderRows = options.placeholderRows || 0;
            var defaultTitle = useTeamTitle ? teamPipelineTitle(teamName) : DEFAULT_PIPELINE_TITLE;
            var pl = plLoad(storageKey) || { title: defaultTitle, queryUrl: '', rows: placeholderRows ? buildPipelinePlaceholders(placeholderRows) : [] };
            if (!pl.title) pl.title = defaultTitle;
            var pipelineTitleHtml = useTeamTitle
                ? escapeHtml(teamPipelineTitle(teamName))
                : titleHtmlWithTeam('Pipeline');
            var div = document.createElement('div');
            div.className = 'slide slide-pipeline';
            div.dataset.storageKey = storageKey;
            div.innerHTML =
                '<div class="pipeline-header">' +
                '<div class="pipeline-title-row">' +
                '<h2 class="pl-title" contenteditable="false">' + pipelineTitleHtml + '</h2>' +
                '<input type="text" class="pl-query" placeholder="Paste ADO query URL to sync topics" value="' + ((pl.queryUrl || '').replace(/"/g, '&quot;')) + '">' +
                '<button type="button" class="pl-query-run">Sync Topics</button>' +
                '</div></div>' +
                '<div class="pl-viz">' + plVizHTML(pl) + '</div>' +
                '<button type="button" class="pl-add-row">+ Add Row</button>';
            $deck.appendChild(div);
            plWireup(div, storageKey);
        }

        /* ── Render SLIDES view ─────────────────────────────────── */
        function renderSlides(slides, options) {
            var opts = options || {};
            var showPipelineWhenEmpty = opts.showPipelineWhenEmpty !== false;
            var tom = $deck.querySelector('#tom');
            var savedTom = tom ? tom.innerHTML : (localStorage.getItem('ar_tom') || '');

            $deck.querySelectorAll('.slide').forEach(function (s) { s.remove(); });

            var topSlide = document.createElement('div');
            topSlide.className = 'slide active';
            topSlide.innerHTML =
                '<h2>' + titleHtmlWithTeam('Top of Mind') + '</h2>' +
                '<div id="tom" class="editable doc-edit" contenteditable="true" ' +
                'placeholder="Click here to type your top-of-mind items…">' +
                savedTom + '</div>';
            $deck.prepend(topSlide);

            topSlide.querySelector('#tom').addEventListener('input', function () {
                localStorage.setItem('ar_tom', this.innerHTML);
                var html = this.innerHTML;
                var tomTeamSlug = teamSlugFromName(baseTeamName);
                debouncedTomSave(tomTeamSlug, html);
            });

            var hasFlatTeamSlides = slides.some(function (slide) {
                return String(slide.id || '').indexOf('flat-') === 0;
            });

            var preloadFlatTeams = (!hasFlatTeamSlides && Array.isArray(opts.preloadFlatTeams) && opts.preloadFlatTeams.length > 0)
                ? opts.preloadFlatTeams : null;
            var shouldShowMainPipeline = !hasFlatTeamSlides && !preloadFlatTeams && (slides.length > 0 || showPipelineWhenEmpty);

            if (shouldShowMainPipeline) {
                /* Slide 2: Pipeline */
                createPipelineSlide();
            }

            var colCount = hasMidpoint ? 6 : 4;

            for (var s = 0; s < slides.length; s++) {
                var slide = slides[s];
                var div = document.createElement('div');
                div.className = 'slide';

                var rows = '';
                if (slide.items.length === 0) {
                    rows = '<tr><td colspan="' + colCount + '" class="no-items">No child epics</td></tr>';
                } else {
                    for (var i = 0; i < slide.items.length; i++) {
                        var it = slide.items[i];
                        rows += '<tr>';
                        rows += '<td><a href="' + linkBase + it.id + '" target="_blank">' + it.id + '</a></td>';
                        rows += '<td>' + it.title + '</td>';

                        if (hasMidpoint) {
                            rows += '<td>' + badge(it.midpointRisk) + '</td>';
                            rows += '<td class="details">' + (it.midpointComment || '&mdash;') + '</td>';
                            rows += '<td>' + badge(it.risk) + '</td>';
                            rows += '<td class="details">' + (it.riskComment || '&mdash;') + '</td>';
                        } else {
                            rows += '<td>' + badge(it.risk) + '</td>';
                            rows += '<td class="details">' + (it.riskComment || '&mdash;') + '</td>';
                        }

                        rows += '</tr>';
                    }
                }

                var headers = '<th>ID</th><th>Title</th>';
                if (hasMidpoint) {
                    headers += '<th>Midpoint Risk</th><th>Midpoint Details</th>';
                    headers += '<th>Final Risk</th><th>Final Details</th>';
                } else {
                    headers += '<th>Midpoint Risk</th><th>Midpoint Details</th>';
                }

                div.innerHTML =
                    '<h2>' + escapeHtml(slide.title) + '</h2>' +
                    '<div class="table-wrap"><table>' +
                    '<thead><tr>' + headers + '</tr></thead>' +
                    '<tbody>' + rows + '</tbody>' +
                    '</table></div>';

                $deck.appendChild(div);

                if (hasFlatTeamSlides) {
                    var teamName = extractTeamNameFromSlideTitle(slide.title);
                    createPipelineSlide({
                        storageKey: teamPipelineStorageKey(teamName),
                        teamName: teamName
                    });
                }
            }

            if (!hasFlatTeamSlides && preloadFlatTeams) {
                preloadFlatTeams.forEach(function(teamName) {
                    createPipelineSlide({
                        storageKey: teamPipelineStorageKey(teamName),
                        teamName: teamName
                    });
                });
            }

            if (hasFlatTeamSlides) {
                total = 1 + slides.length * 2;
            } else if (preloadFlatTeams) {
                total = 1 + preloadFlatTeams.length;
            } else {
                total = (shouldShowMainPipeline ? 2 : 1) + slides.length;
            }
            $empty.hidden = true;
            if (activeView === 'slides') $nav.hidden = false;
            show(0);
        }

        /* ── Render DOC view ────────────────────────────────────── */
        function renderDoc(sections, docLinkBase) {
            var today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            var html = '';

            /* Document header: title, author, date */
            html += '<header class="doc-header">';
            html += '<h1 class="doc-title" contenteditable="true" placeholder="Report Title"></h1>';
            html += '<div class="doc-meta">';
            html += '<span class="doc-author" contenteditable="true" placeholder="Author">' + '</span>';
            html += '<span class="doc-date">' + today + '</span>';
            html += '</div>';
            html += '</header>';

            /* Section 1: Workstream Overview (editable) */
            html += '<section class="doc-section">';
            html += '<h2>1. Workstream Overview</h2>';
            html += '<div class="editable doc-edit" contenteditable="true" ' +
                    'placeholder="Write your executive summary here…"></div>';
            html += '</section>';

            /* Section 2: Priorities (card-based) */
            html += '<section class="doc-section">';
            html += '<h2>2. Priorities</h2>';
            html += '<div id="priorityCards" class="priority-grid"></div>';
            html += '<button type="button" id="addPriority" class="add-card-btn" title="Add priority">+ Add Priority</button>';
            html += '</section>';

            /* Section 3: Workstream Preview (from ADO data) */
            html += '<section class="doc-section">';
            html += '<h2>3. Workstream Preview</h2>';

            for (var si = 0; si < sections.length; si++) {
                var sec = sections[si];
                html += '<div class="doc-objective">';
                html += '<h3>' + sec.objectiveTitle + '</h3>';

                for (var gi = 0; gi < sec.groups.length; gi++) {
                    var grp = sec.groups[gi];
                    html += '<h4>' + grp.title + '</h4>';
                    html += '<dl class="group-meta">';
                    html += '<div><dt>DRI</dt><dd>' + (grp.dri || '&mdash;') + '</dd></div>';
                    html += '<div><dt>Original Estimate</dt><dd>' + (grp.originalEstimate || '&mdash;') + '</dd></div>';
                    html += '<div><dt>Comments</dt><dd>' + (grp.comments || '&mdash;') + '</dd></div>';
                    html += '</dl>';

                    if (grp.items.length === 0) {
                        html += '<p class="doc-no-items">No child work items</p>';
                    } else {
                        html += '<table class="doc-table"><thead><tr>' +
                                '<th>Title</th><th>DRI</th><th>Original Estimate</th>' +
                                '</tr></thead><tbody>';
                        for (var ii = 0; ii < grp.items.length; ii++) {
                            var it = grp.items[ii];
                            html += '<tr>';
                            html += '<td><a href="' + docLinkBase + it.id + '" target="_blank">' + it.title + '</a></td>';
                            html += '<td>' + it.dri + '</td>';
                            html += '<td>' + (it.originalEstimate || '&mdash;') + '</td>';
                            html += '</tr>';
                        }
                        html += '</tbody></table>';
                    }
                }
                html += '</div>';
            }

            html += '</section>';

            $docContent.innerHTML = html;

            /* Wire up priority card add/remove */
            var $grid = document.getElementById('priorityCards');
            document.getElementById('addPriority').addEventListener('click', function () {
                addPriorityCard($grid);
            });
        }

        function addPriorityCard(container, title, desc) {
            var card = document.createElement('div');
            card.className = 'priority-card';
            card.innerHTML =
                '<button type="button" class="card-remove" title="Remove">&times;</button>' +
                '<div class="card-title" contenteditable="true" placeholder="Priority title\u2026">' + (title || '') + '</div>' +
                '<div class="card-desc doc-edit" contenteditable="true" placeholder="Description\u2026">' + (desc || '') + '</div>';

            card.querySelector('.card-remove').addEventListener('click', function () {
                card.remove();
            });

            container.appendChild(card);
            /* Focus the title of the new card */
            card.querySelector('.card-title').focus();
        }

        /* ── Retro risk icons ────────────────────────────────────── */
        function riskToKey(risk) {
            var r = (risk || '').toLowerCase();
            if (r.includes('on track'))  return 'green';
            if (r.includes('at risk'))   return 'yellow';
            if (r.includes('off track')) return 'red';
            return '';
        }

        function retroIcon(risk) {
            var r = (risk || '').toLowerCase();
            if (r.includes('on track'))  return '<span class="retro-icon retro-green">&#9733;</span>';
            if (r.includes('at risk'))   return '<span class="retro-icon retro-yellow">&#9650;</span>';
            if (r.includes('off track')) return '<span class="retro-icon retro-red">&#11042;</span>';
            return '<span class="retro-icon retro-none">&mdash;</span>';
        }

        function retroIconFromKey(k) {
            if (k === 'green')  return '<span class="retro-icon retro-green">&#9733;</span>';
            if (k === 'yellow') return '<span class="retro-icon retro-yellow">&#9650;</span>';
            if (k === 'red')    return '<span class="retro-icon retro-red">&#11042;</span>';
            return '<span class="retro-icon retro-none">&mdash;</span>';
        }

        function retroRagIcon(v) {
            if (v === 'green')  return '<span class="retro-rag-big retro-green">&#9733;</span>';
            if (v === 'yellow') return '<span class="retro-rag-big retro-yellow">&#9650;</span>';
            if (v === 'red')    return '<span class="retro-rag-big retro-red">&#11042;</span>';
            return '<span class="retro-rag-big retro-none">&mdash;</span>';
        }

        var retroEditing = false;
        var retroSlideFit = false;

        function retroToggleFit() {
            retroSlideFit = !retroSlideFit;
            renderRetroFromCache();
        }

        function retroSaveOverrides() {
            /* Load previous overrides so cleared (skipped) items are preserved */
            var prev = {};
            try { prev = JSON.parse(localStorage.getItem('ar_retro_user')) || {}; } catch(e) {}

            var overrides = {};
            $retroContent.querySelectorAll('tr[data-retro-id]').forEach(function(tr) {
                var id = tr.dataset.retroId;
                var ragSel = tr.querySelector('.retro-rag-sel');
                var faInput = tr.querySelector('.retro-fa-input');
                var missionEl = tr.querySelector('.retro-mission');
                var msItems = tr.querySelectorAll('.retro-ms-text');
                var justItems = tr.querySelectorAll('.retro-just-text');

                var msRiskSels = tr.querySelectorAll('.retro-ms-risk-sel');

                /* Start from previous overrides for this row (keeps cleared items) */
                var prevRow = prev[id] || {};
                var msArr = Object.assign({}, prevRow.milestones || {});
                var msRiskArr = Object.assign({}, prevRow.milestoneRisks || {});
                var justArr = Object.assign({}, prevRow.justifications || {});

                /* Overlay current DOM values */
                msItems.forEach(function(el) { msArr[el.dataset.idx] = el.textContent; });
                msRiskSels.forEach(function(sel) { msRiskArr[sel.dataset.idx] = sel.value; });
                justItems.forEach(function(el) { justArr[el.dataset.idx] = el.textContent; });

                overrides[id] = {
                    rag: ragSel ? ragSel.value : (tr.dataset.rag || ''),
                    featureArea: faInput ? faInput.value : (tr.querySelector('.retro-fa-display')?.textContent || ''),
                    mission: missionEl ? missionEl.textContent : '',
                    milestones: msArr,
                    milestoneRisks: msRiskArr,
                    justifications: justArr
                };
            });
            localStorage.setItem('ar_retro_user', JSON.stringify(overrides));
            return overrides;
        }

        function retroToggleEdit() {
            var btn = $retroContent.querySelector('.retro-edit-btn');
            if (retroEditing) {
                /* Save and switch to read-only */
                var ov = retroSaveOverrides();
                retroEditing = false;
                /* Re-render using stored data + overrides */
                renderRetroFromCache();
                return;
            }
            /* Switch to edit mode */
            retroEditing = true;
            $retroContent.querySelectorAll('.retro-rag-sel').forEach(function(s) { s.hidden = false; });
            $retroContent.querySelectorAll('.retro-rag-display').forEach(function(s) { s.hidden = true; });
            $retroContent.querySelectorAll('.retro-fa-input').forEach(function(s) { s.hidden = false; });
            $retroContent.querySelectorAll('.retro-fa-display').forEach(function(s) { s.hidden = true; });
            $retroContent.querySelectorAll('.retro-mission').forEach(function(s) { s.contentEditable = 'true'; s.classList.add('retro-editable'); });
            $retroContent.querySelectorAll('.retro-ms-text').forEach(function(s) { s.contentEditable = 'true'; s.classList.add('retro-editable'); });
            $retroContent.querySelectorAll('.retro-just-text').forEach(function(s) { s.contentEditable = 'true'; s.classList.add('retro-editable'); });
            $retroContent.querySelectorAll('.retro-ms-risk-sel').forEach(function(s) { s.hidden = false; });
            $retroContent.querySelectorAll('.retro-ms-icon-display').forEach(function(s) { s.hidden = true; });
            /* Show add buttons */
            $retroContent.querySelectorAll('.retro-add-ms-btn').forEach(function(b) { b.hidden = false; });
            $retroContent.querySelectorAll('.retro-add-just-btn').forEach(function(b) { b.hidden = false; });
            btn.innerHTML = '&#10003; Done';

            /* Wire add-milestone buttons */
            $retroContent.querySelectorAll('.retro-add-ms-btn').forEach(function(b) {
                b.addEventListener('click', function() {
                    var ul = b.previousElementSibling;

                    var nextIdx = 'add-' + existing.length;

                    li.innerHTML =
                        '<span class="retro-ms-icon-display" hidden></span>' +
                        '<select class="retro-ms-risk-sel" data-idx="' + nextIdx + '">' +

                        '<option value="green">&#9733; Green</option>' +
                        '<option value="yellow">&#9650; Yellow</option>' +
                        '<option value="red">&#11042; Red</option>' +
                        '</select> ' +
                        '<span class="retro-ms-text retro-editable" data-idx="' + nextIdx + '" contenteditable="true"></span>';
                    ul.appendChild(li);
                    li.querySelector('.retro-ms-text').focus();
                });

            /* Wire add-justification buttons */
            $retroContent.querySelectorAll('.retro-add-just-btn').forEach(function(b) {
                b.addEventListener('click', function() {
                    var ul = b.previousElementSibling;
                    var existing = ul.querySelectorAll('.retro-just-text[data-idx^="add-"]');
                    var nextIdx = 'add-' + existing.length;

                    li.innerHTML = '<span class="retro-just-text retro-editable" data-idx="' + nextIdx + '" contenteditable="true"></span>';
                    ul.appendChild(li);

                });
