<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anything Report</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ── Toolbar ─────────────────────────────────────────────── -->
    <header>
        <span class="logo">Anything Report</span>
        <div class="view-toggle">
            <button class="view-btn active" data-view="slides">Slides</button>
            <button class="view-btn" data-view="retro">Retro</button>
            <button class="view-btn" data-view="doc">Doc</button>
        </div>
        <form id="configForm">
            <input type="text" id="queryUrl"
                   placeholder="Paste ADO query URL…" required>
            <input type="date" id="midpointDate"
                   title="Midpoint date (optional) — snapshot risk fields from this date">
            <button type="submit" id="runBtn">&#9654; Run</button>
            <button type="button" id="pptxBtn" hidden title="Download as PowerPoint">&#8595; PPTX</button>
        </form>
    </header>

    <!-- ── Slide deck ──────────────────────────────────────────── -->
    <main id="deck">
        <div id="empty">
            Paste an Azure DevOps query URL above and click
            <strong>Run</strong> to generate your report.
        </div>
        <div id="loading" hidden><div class="spinner"></div></div>
    </main>

    <!-- ── Navigation (slides) ─────────────────────────────────── -->
    <nav id="slideNav" hidden>
        <button id="prev" title="Previous (←)">&#9664;</button>
        <span id="counter"></span>
        <button id="next" title="Next (→)">&#9654;</button>
    </nav>

    <!-- ── Retro view ───────────────────────────────────────────── -->
    <div id="retroView" class="retro-view" hidden>
        <div id="retroContent" class="retro-content">
            <div id="retroEmpty" class="doc-empty">
                Paste an Azure DevOps query URL above and click
                <strong>Run</strong> to generate the retro.
            </div>
        </div>
    </div>

    <!-- ── Doc view ────────────────────────────────────────────── -->
    <div id="docView" class="doc-view" hidden>
        <div id="docContent" class="doc-content">
            <div id="docEmpty" class="doc-empty">
                Paste an Azure DevOps query URL above and click
                <strong>Run</strong> to generate the document.
            </div>
        </div>
    </div>

    <!-- ── Floating formatting toolbar (shared, positioned near focused editable) ── -->
    <div id="fmtBar" class="fmt-bar" hidden>
        <button type="button" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button type="button" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button type="button" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
        <span class="fmt-sep"></span>
        <button type="button" data-cmd="insertUnorderedList" title="Bullet list">&#8226; List</button>
        <button type="button" data-cmd="insertOrderedList" title="Numbered list">1. List</button>
    </div>

    <script>
        /* ── State ──────────────────────────────────────────────── */
        let total   = 0;
        let current = 0;
        let linkBase = '';
        let hasMidpoint = false;
        let activeView = 'slides';          // 'slides' | 'retro' | 'doc'
        let lastSlides = null;              // cache for view switches

        const $deck    = document.getElementById('deck');
        const $nav     = document.getElementById('slideNav');
        const $counter = document.getElementById('counter');
        const $empty   = document.getElementById('empty');
        const $loading = document.getElementById('loading');
        const $query   = document.getElementById('queryUrl');
        const $midDate = document.getElementById('midpointDate');
        const $run     = document.getElementById('runBtn');
        const $docView = document.getElementById('docView');
        const $docContent = document.getElementById('docContent');
        const $docEmpty   = document.getElementById('docEmpty');
        const $retroView    = document.getElementById('retroView');
        const $retroContent = document.getElementById('retroContent');
        const $retroEmpty   = document.getElementById('retroEmpty');
        const $fmtBar     = document.getElementById('fmtBar');
        const $pptxBtn    = document.getElementById('pptxBtn');

        /* Restore saved inputs */
        $query.value   = localStorage.getItem('ar_query') || '';
        $midDate.value = localStorage.getItem('ar_middate') || '';

        /* ── View toggle ────────────────────────────────────────── */
        document.querySelectorAll('.view-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var view = btn.dataset.view;
                if (view === activeView) return;
                activeView = view;

                document.querySelectorAll('.view-btn').forEach(function (b) {
                    b.classList.toggle('active', b.dataset.view === view);
                });

                $deck.hidden      = (view !== 'slides');
                $nav.hidden       = (view !== 'slides') || total === 0;
                $retroView.hidden = (view !== 'retro');
                $docView.hidden   = (view !== 'doc');
            });
        });

        /* ── Formatting toolbar (floats near focused editable) ── */
        document.querySelectorAll('#fmtBar button').forEach(function (btn) {
            btn.addEventListener('mousedown', function (e) {
                e.preventDefault();
                document.execCommand(btn.dataset.cmd, false, null);
            });
        });

        /* Show toolbar above whichever .doc-edit is focused */
        function positionToolbar(editEl) {
            var rect = editEl.getBoundingClientRect();
            $fmtBar.hidden = false;
            $fmtBar.style.top  = (rect.top + window.scrollY - $fmtBar.offsetHeight - 4) + 'px';
            $fmtBar.style.left = rect.left + 'px';
            $fmtBar.style.width = rect.width + 'px';
        }

        document.addEventListener('focusin', function (e) {
            if (e.target.classList.contains('doc-edit')) {
                positionToolbar(e.target);
            }
        });
        document.addEventListener('focusout', function (e) {
            if (e.target.classList.contains('doc-edit')) {
                /* Delay so toolbar button clicks register first */
                setTimeout(function () {
                    var active = document.activeElement;
                    if (!active || !active.classList.contains('doc-edit')) {
                        $fmtBar.hidden = true;
                    }
                }, 150);
            }
        });

        /* Reposition on scroll inside doc content */
        document.getElementById('docContent').addEventListener('scroll', function () {
            var focused = document.querySelector('.doc-edit:focus');
            if (focused) positionToolbar(focused);
        });

        /* ── Slide navigation ───────────────────────────────────── */
        function show(i) {
            current = Math.max(0, Math.min(i, total - 1));
            $deck.querySelectorAll('.slide').forEach(
                (s, idx) => s.classList.toggle('active', idx === current)
            );
            $counter.textContent = (current + 1) + ' / ' + total;
        }

        document.getElementById('prev').onclick = () => show(current - 1);
        document.getElementById('next').onclick = () => show(current + 1);
        document.addEventListener('keydown', function (e) {
            if (activeView !== 'slides') return;
            if (e.target.closest('.editable')) return;
            if (e.key === 'ArrowLeft')  show(current - 1);
            if (e.key === 'ArrowRight') show(current + 1);
        });

        /* ── Risk badge (pure string) ───────────────────────────── */
        function badge(risk) {
            var r = (risk || '').toLowerCase();
            if (r.includes('on track'))  return '<span class="risk on-track">&#10004; On Track</span>';
            if (r.includes('at risk'))   return '<span class="risk at-risk">&#9888; At Risk</span>';
            if (r.includes('off track')) return '<span class="risk off-track">&#10008; Off Track</span>';
            return '<span class="risk unknown">&mdash;</span>';
        }

        /* ── Pipeline helpers ────────────────────────────────────── */
        var PL_STAGES  = ['Investigate','Explainer / Design Doc','Implementation','Dev Trial','Origin Trial / CFR','Ship'];
        var PL_HEADERS = ['INVESTIGATE','EXPLAINER /<br>DESIGN DOC','IMPLEMENTATION','DEV TRIAL','ORIGIN TRIAL /<br>CFR','SHIP'];

        function plLoad() { try { return JSON.parse(localStorage.getItem('ar_pipeline')); } catch(e) { return null; } }
        function plSave(d) { localStorage.setItem('ar_pipeline', JSON.stringify(d)); }

        function normalizePipelineStageValue(value) {
            var v = (value || '').trim();
            var lower = v.toLowerCase();
            if (lower === 'complete' || lower === 'completed') return 'complete';
            return v;
        }

        function plVizHTML(pl) {
            if (!pl || !pl.rows || !pl.rows.length)
                return '<p class="pv-empty">Click <b>&#9998; Edit</b> to add pipeline rows.</p>';
            var h = '<div class="pv-legend">' +
                '<span class="pv-leg"><span class="pv-leg-arrow">&#9660;</span> Roughly &ldquo;Where we are&rdquo;</span>' +
                '<span class="pv-leg"><span class="pv-leg-circ complete"></span> Completed</span>' +
                '<span class="pv-leg"><span class="pv-leg-circ committed"></span> Committed for current cycle</span>' +
                '<span class="pv-leg"><span class="pv-leg-circ future"></span> Planned for future cycle</span></div>';
            h += '<div class="pv-chart"><div class="pv-header-row"><div class="pv-corner"></div>';
            for (var i = 0; i < PL_HEADERS.length; i++) h += '<div class="pv-col-hdr">' + PL_HEADERS[i] + '</div>';
            h += '</div>';
            for (var r = 0; r < pl.rows.length; r++) {
                var row = pl.rows[r];
                h += '<div class="pv-row"><div class="pv-topic"><span>' + (row.topic || '') + '</span></div>';
                h += '<div class="pv-stages"><div class="pv-line"></div>';
                for (var c = 0; c < 6; c++) {
                    var v = normalizePipelineStageValue(row.stages && row.stages[c] || '');
                    var here = (row.hereCol === c);
                    var warn = (row.warnCol === c);
                    var done = (v === 'complete');
                    var empty = (v === '');
                    h += '<div class="pv-cell">';
                    if (here) h += '<div class="pv-arrow">&#9660;</div>';
                    if (warn) h += '<div class="pv-warn" title="Watch item">&#9888;&#65039;</div>';
                    if (done) {
                        h += '<div class="pv-node complete"></div>';
                    } else if (!empty) {
                        var cls = (row.hereCol >= 0 && c <= row.hereCol) ? 'committed' : 'future';
                        h += '<div class="pv-node ' + cls + '">' + v + '</div>';
                    }
                    h += '</div>';
                }
                h += '</div></div>';
            }
            h += '</div>';
            return h;
        }

        function plEditorRowHTML(rd) {
            rd = rd || { topic: '', stages: ['','','','','',''], hereCol: -1, warnCol: -1 };
            var h = '<tr class="pe-row"><td><input type="text" class="pe-topic" value="' +
                (rd.topic || '').replace(/"/g, '&quot;') + '" placeholder="Topic name"></td>';
            for (var s = 0; s < 6; s++)
                h += '<td><input type="text" class="pe-stage" value="' +
                    (rd.stages[s] || '').replace(/"/g, '&quot;') + '" placeholder="complete / label"></td>';
            h += '<td><select class="pe-here"><option value="-1"' +
                (rd.hereCol < 0 ? ' selected' : '') + '>&mdash;</option>';
            for (var s = 0; s < PL_STAGES.length; s++)
                h += '<option value="' + s + '"' + (rd.hereCol === s ? ' selected' : '') + '>' + PL_STAGES[s] + '</option>';
            h += '</select></td><td><select class="pe-warn"><option value="-1"' +
                ((rd.warnCol === undefined || rd.warnCol < 0) ? ' selected' : '') + '>&mdash;</option>';
            for (var s = 0; s < PL_STAGES.length; s++)
                h += '<option value="' + s + '"' + (rd.warnCol === s ? ' selected' : '') + '>' + PL_STAGES[s] + '</option>';
            h += '</select></td><td><button type="button" class="pe-remove" title="Remove">&times;</button></td></tr>';
            return h;
        }

        function plEditorHTML(pl) {
            var d = pl || { title: 'Pipeline', rows: [] };
            var h = '<table class="pe-table"><thead><tr><th class="pe-th-topic">Topic</th>';
            for (var s = 0; s < PL_STAGES.length; s++) h += '<th>' + PL_STAGES[s] + '</th>';
            h += '<th>Here</th><th>Warn</th><th></th></tr></thead><tbody id="peRows">';
            for (var r = 0; r < d.rows.length; r++) h += plEditorRowHTML(d.rows[r]);
            h += '</tbody></table>';
            h += '<div class="pe-actions"><button type="button" class="pe-add" id="peAdd">+ Add Row</button>';
            h += '<button type="button" class="pe-apply" id="peApply">&#10003; Apply</button></div>';
            return h;
        }

        function plApply(vizEl, editorEl, titleEl) {
            var pl = { title: titleEl.textContent || 'Pipeline', rows: [] };
            editorEl.querySelectorAll('.pe-row').forEach(function(tr) {
                var topic = tr.querySelector('.pe-topic').value;
                var stages = [];
                tr.querySelectorAll('.pe-stage').forEach(function(inp) {
                    stages.push(normalizePipelineStageValue(inp.value));
                });
                pl.rows.push({
                    topic: topic,
                    stages: stages,
                    hereCol: parseInt(tr.querySelector('.pe-here').value, 10),
                    warnCol: parseInt(tr.querySelector('.pe-warn').value, 10)
                });
            });
            plSave(pl);
            vizEl.innerHTML = plVizHTML(pl);
        }

        function plWireup(slideEl) {
            var $viz = slideEl.querySelector('.pl-viz');
            var $ed  = slideEl.querySelector('.pl-editor');
            var $btn = slideEl.querySelector('.pl-edit-btn');
            var $ttl = slideEl.querySelector('.pl-title');

            function wireEditorButtons(container) {
                container.querySelector('#peAdd').addEventListener('click', function() {
                    var tbody = container.querySelector('#peRows');
                    tbody.insertAdjacentHTML('beforeend', plEditorRowHTML(null));
                    var last = tbody.lastElementChild;
                    last.querySelector('.pe-remove').addEventListener('click', function() { last.remove(); });
                });
                container.querySelector('#peApply').addEventListener('click', function() {
                    plApply($viz, $ed, $ttl);
                    $ed.hidden = true; $viz.hidden = false;
                    $btn.innerHTML = '&#9998; Edit';
                });
                container.querySelectorAll('.pe-remove').forEach(function(b) {
                    b.addEventListener('click', function() { b.closest('.pe-row').remove(); });
                });
            }

            $btn.addEventListener('click', function() {
                if (!$ed.hidden) {
                    plApply($viz, $ed, $ttl);
                    $ed.hidden = true; $viz.hidden = false;
                    $btn.innerHTML = '&#9998; Edit';
                } else {
                    var pl = plLoad() || { title: 'Pipeline', rows: [] };
                    $ed.innerHTML = plEditorHTML(pl);
                    wireEditorButtons($ed);
                    $ed.hidden = false; $viz.hidden = true;
                    $btn.innerHTML = '&#10003; Done';
                }
            });

            $ttl.addEventListener('input', function() {
                var pl = plLoad() || { title: 'Pipeline', rows: [] };
                pl.title = $ttl.textContent;
                plSave(pl);
            });

            wireEditorButtons($ed);
        }

        function createPipelineSlide() {
            var pl = plLoad() || { title: 'Pipeline', rows: [] };
            var div = document.createElement('div');
            div.className = 'slide';
            div.innerHTML =
                '<div class="pipeline-header">' +
                '<h2 class="pl-title" contenteditable="true">' + (pl.title || 'Pipeline') + '</h2>' +
                '<button type="button" class="pl-edit-btn">&#9998; Edit</button></div>' +
                '<div class="pl-viz">' + plVizHTML(pl) + '</div>' +
                '<div class="pl-editor" hidden>' + plEditorHTML(pl) + '</div>';
            $deck.appendChild(div);
            plWireup(div);
        }

        /* ── Render SLIDES view ─────────────────────────────────── */
        function renderSlides(slides) {
            var tom = $deck.querySelector('#tom');
            var savedTom = tom ? tom.innerHTML : (localStorage.getItem('ar_tom') || '');

            $deck.querySelectorAll('.slide').forEach(function (s) { s.remove(); });

            var topSlide = document.createElement('div');
            topSlide.className = 'slide active';
            topSlide.innerHTML =
                '<h2>Top of Mind</h2>' +
                '<div id="tom" class="editable doc-edit" contenteditable="true" ' +
                'placeholder="Click here to type your top-of-mind items…">' +
                savedTom + '</div>';
            $deck.prepend(topSlide);

            topSlide.querySelector('#tom').addEventListener('input', function () {
                localStorage.setItem('ar_tom', this.innerHTML);
            });

            /* Slide 2: Pipeline */
            createPipelineSlide();

            var colCount = hasMidpoint ? 6 : 4;

            for (var s = 0; s < slides.length; s++) {
                var slide = slides[s];
                var div = document.createElement('div');
                div.className = 'slide';

                var rows = '';
                if (slide.items.length === 0) {
                    rows = '<tr><td colspan="' + colCount + '" class="no-items">No child epics</td></tr>';
                } else {
                    for (var i = 0; i < slide.items.length; i++) {
                        var it = slide.items[i];
                        rows += '<tr>';
                        rows += '<td><a href="' + linkBase + it.id + '" target="_blank">' + it.id + '</a></td>';
                        rows += '<td>' + it.title + '</td>';

                        if (hasMidpoint) {
                            rows += '<td>' + badge(it.midpointRisk) + '</td>';
                            rows += '<td class="details">' + (it.midpointComment || '&mdash;') + '</td>';
                            rows += '<td>' + badge(it.risk) + '</td>';
                            rows += '<td class="details">' + (it.riskComment || '&mdash;') + '</td>';
                        } else {
                            rows += '<td>' + badge(it.risk) + '</td>';
                            rows += '<td class="details">' + (it.riskComment || '&mdash;') + '</td>';
                        }

                        rows += '</tr>';
                    }
                }

                var headers = '<th>ID</th><th>Title</th>';
                if (hasMidpoint) {
                    headers += '<th>Midpoint Risk</th><th>Midpoint Details</th>';
                    headers += '<th>Final Risk</th><th>Final Details</th>';
                } else {
                    headers += '<th>Midpoint Risk</th><th>Midpoint Details</th>';
                }

                div.innerHTML =
                    '<h2>' + slide.title + '</h2>' +
                    '<div class="table-wrap"><table>' +
                    '<thead><tr>' + headers + '</tr></thead>' +
                    '<tbody>' + rows + '</tbody>' +
                    '</table></div>';

                $deck.appendChild(div);
            }

            total = 2 + slides.length;
            $empty.hidden = true;
            if (activeView === 'slides') $nav.hidden = false;
            show(0);
        }

        /* ── Render DOC view ────────────────────────────────────── */
        function renderDoc(sections, docLinkBase) {
            var today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            var html = '';

            /* Document header: title, author, date */
            html += '<header class="doc-header">';
            html += '<h1 class="doc-title" contenteditable="true" placeholder="Report Title"></h1>';
            html += '<div class="doc-meta">';
            html += '<span class="doc-author" contenteditable="true" placeholder="Author">' + '</span>';
            html += '<span class="doc-date">' + today + '</span>';
            html += '</div>';
            html += '</header>';

            /* Section 1: Workstream Overview (editable) */
            html += '<section class="doc-section">';
            html += '<h2>1. Workstream Overview</h2>';
            html += '<div class="editable doc-edit" contenteditable="true" ' +
                    'placeholder="Write your executive summary here…"></div>';
            html += '</section>';

            /* Section 2: Priorities (card-based) */
            html += '<section class="doc-section">';
            html += '<h2>2. Priorities</h2>';
            html += '<div id="priorityCards" class="priority-grid"></div>';
            html += '<button type="button" id="addPriority" class="add-card-btn" title="Add priority">+ Add Priority</button>';
            html += '</section>';

            /* Section 3: Workstream Preview (from ADO data) */
            html += '<section class="doc-section">';
            html += '<h2>3. Workstream Preview</h2>';

            for (var si = 0; si < sections.length; si++) {
                var sec = sections[si];
                html += '<div class="doc-objective">';
                html += '<h3>' + sec.objectiveTitle + '</h3>';

                for (var gi = 0; gi < sec.groups.length; gi++) {
                    var grp = sec.groups[gi];
                    html += '<h4>' + grp.title + '</h4>';
                    html += '<dl class="group-meta">';
                    html += '<div><dt>DRI</dt><dd>' + (grp.dri || '&mdash;') + '</dd></div>';
                    html += '<div><dt>Original Estimate</dt><dd>' + (grp.originalEstimate || '&mdash;') + '</dd></div>';
                    html += '<div><dt>Comments</dt><dd>' + (grp.comments || '&mdash;') + '</dd></div>';
                    html += '</dl>';

                    if (grp.items.length === 0) {
                        html += '<p class="doc-no-items">No child work items</p>';
                    } else {
                        html += '<table class="doc-table"><thead><tr>' +
                                '<th>Title</th><th>DRI</th><th>Original Estimate</th>' +
                                '</tr></thead><tbody>';
                        for (var ii = 0; ii < grp.items.length; ii++) {
                            var it = grp.items[ii];
                            html += '<tr>';
                            html += '<td><a href="' + docLinkBase + it.id + '" target="_blank">' + it.title + '</a></td>';
                            html += '<td>' + it.dri + '</td>';
                            html += '<td>' + (it.originalEstimate || '&mdash;') + '</td>';
                            html += '</tr>';
                        }
                        html += '</tbody></table>';
                    }
                }
                html += '</div>';
            }

            html += '</section>';

            $docContent.innerHTML = html;

            /* Wire up priority card add/remove */
            var $grid = document.getElementById('priorityCards');
            document.getElementById('addPriority').addEventListener('click', function () {
                addPriorityCard($grid);
            });
        }

        function addPriorityCard(container, title, desc) {
            var card = document.createElement('div');
            card.className = 'priority-card';
            card.innerHTML =
                '<button type="button" class="card-remove" title="Remove">&times;</button>' +
                '<div class="card-title" contenteditable="true" placeholder="Priority title\u2026">' + (title || '') + '</div>' +
                '<div class="card-desc doc-edit" contenteditable="true" placeholder="Description\u2026">' + (desc || '') + '</div>';

            card.querySelector('.card-remove').addEventListener('click', function () {
                card.remove();
            });

            container.appendChild(card);
            /* Focus the title of the new card */
            card.querySelector('.card-title').focus();
        }

        /* ── Retro risk icons ────────────────────────────────────── */
        function riskToKey(risk) {
            var r = (risk || '').toLowerCase();
            if (r.includes('on track'))  return 'green';
            if (r.includes('at risk'))   return 'yellow';
            if (r.includes('off track')) return 'red';
            return '';
        }

        function retroIcon(risk) {
            var r = (risk || '').toLowerCase();
            if (r.includes('on track'))  return '<span class="retro-icon retro-green">&#9733;</span>';
            if (r.includes('at risk'))   return '<span class="retro-icon retro-yellow">&#9650;</span>';
            if (r.includes('off track')) return '<span class="retro-icon retro-red">&#11042;</span>';
            return '<span class="retro-icon retro-none">&mdash;</span>';
        }

        function retroIconFromKey(k) {
            if (k === 'green')  return '<span class="retro-icon retro-green">&#9733;</span>';
            if (k === 'yellow') return '<span class="retro-icon retro-yellow">&#9650;</span>';
            if (k === 'red')    return '<span class="retro-icon retro-red">&#11042;</span>';
            return '<span class="retro-icon retro-none">&mdash;</span>';
        }

        function retroRagIcon(v) {
            if (v === 'green')  return '<span class="retro-rag-big retro-green">&#9733;</span>';
            if (v === 'yellow') return '<span class="retro-rag-big retro-yellow">&#9650;</span>';
            if (v === 'red')    return '<span class="retro-rag-big retro-red">&#11042;</span>';
            return '<span class="retro-rag-big retro-none">&mdash;</span>';
        }

        var retroEditing = false;
        var retroSlideFit = false;

        function retroToggleFit() {
            retroSlideFit = !retroSlideFit;
            renderRetroFromCache();
        }

        function retroSaveOverrides() {
            /* Load previous overrides so cleared (skipped) items are preserved */
            var prev = {};
            try { prev = JSON.parse(localStorage.getItem('ar_retro_user')) || {}; } catch(e) {}

            var overrides = {};
            $retroContent.querySelectorAll('tr[data-retro-id]').forEach(function(tr) {
                var id = tr.dataset.retroId;
                var ragSel = tr.querySelector('.retro-rag-sel');
                var faInput = tr.querySelector('.retro-fa-input');
                var missionEl = tr.querySelector('.retro-mission');
                var msItems = tr.querySelectorAll('.retro-ms-text');
                var justItems = tr.querySelectorAll('.retro-just-text');

                var msRiskSels = tr.querySelectorAll('.retro-ms-risk-sel');

                /* Start from previous overrides for this row (keeps cleared items) */
                var prevRow = prev[id] || {};
                var msArr = Object.assign({}, prevRow.milestones || {});
                var msRiskArr = Object.assign({}, prevRow.milestoneRisks || {});
                var justArr = Object.assign({}, prevRow.justifications || {});

                /* Overlay current DOM values */
                msItems.forEach(function(el) { msArr[el.dataset.idx] = el.textContent; });
                msRiskSels.forEach(function(sel) { msRiskArr[sel.dataset.idx] = sel.value; });
                justItems.forEach(function(el) { justArr[el.dataset.idx] = el.textContent; });

                overrides[id] = {
                    rag: ragSel ? ragSel.value : (tr.dataset.rag || ''),
                    featureArea: faInput ? faInput.value : (tr.querySelector('.retro-fa-display')?.textContent || ''),
                    mission: missionEl ? missionEl.textContent : '',
                    milestones: msArr,
                    milestoneRisks: msRiskArr,
                    justifications: justArr
                };
            });
            localStorage.setItem('ar_retro_user', JSON.stringify(overrides));
            return overrides;
        }

        function retroToggleEdit() {
            var btn = $retroContent.querySelector('.retro-edit-btn');
            if (retroEditing) {
                /* Save and switch to read-only */
                var ov = retroSaveOverrides();
                retroEditing = false;
                /* Re-render using stored data + overrides */
                renderRetroFromCache();
                return;
            }
            /* Switch to edit mode */
            retroEditing = true;
            $retroContent.querySelectorAll('.retro-rag-sel').forEach(function(s) { s.hidden = false; });
            $retroContent.querySelectorAll('.retro-fa-input').forEach(function(s) { s.hidden = false; });
            $retroContent.querySelectorAll('.retro-fa-display').forEach(function(s) { s.hidden = true; });
            $retroContent.querySelectorAll('.retro-mission').forEach(function(s) { s.contentEditable = 'true'; s.classList.add('retro-editable'); });
            $retroContent.querySelectorAll('.retro-ms-text').forEach(function(s) { s.contentEditable = 'true'; s.classList.add('retro-editable'); });
            $retroContent.querySelectorAll('.retro-just-text').forEach(function(s) { s.contentEditable = 'true'; s.classList.add('retro-editable'); });
            $retroContent.querySelectorAll('.retro-ms-risk-sel').forEach(function(s) { s.hidden = false; });
            $retroContent.querySelectorAll('.retro-ms-icon-display').forEach(function(s) { s.hidden = true; });
            /* Show add buttons */
            $retroContent.querySelectorAll('.retro-add-ms-btn').forEach(function(b) { b.hidden = false; });
            $retroContent.querySelectorAll('.retro-add-just-btn').forEach(function(b) { b.hidden = false; });
            btn.innerHTML = '&#10003; Done';

            /* Wire add-milestone buttons */
            $retroContent.querySelectorAll('.retro-add-ms-btn').forEach(function(b) {
                b.addEventListener('click', function() {
                    var ul = b.previousElementSibling;
                    var existing = ul.querySelectorAll('.retro-ms-text[data-idx^="add-"]');
                    var nextIdx = 'add-' + existing.length;
                    var li = document.createElement('li');
                    li.innerHTML =
                        '<span class="retro-ms-icon-display" hidden></span>' +
                        '<select class="retro-ms-risk-sel" data-idx="' + nextIdx + '">' +
                        '<option value="" selected>&mdash;</option>' +
                        '<option value="green">&#9733; Green</option>' +
                        '<option value="yellow">&#9650; Yellow</option>' +
                        '<option value="red">&#11042; Red</option>' +
                        '</select> ' +
                        '<span class="retro-ms-text retro-editable" data-idx="' + nextIdx + '" contenteditable="true"></span>';
                    ul.appendChild(li);
                    li.querySelector('.retro-ms-text').focus();
                });
            });

            /* Wire add-justification buttons */
            $retroContent.querySelectorAll('.retro-add-just-btn').forEach(function(b) {
                b.addEventListener('click', function() {
                    var ul = b.previousElementSibling;
                    var existing = ul.querySelectorAll('.retro-just-text[data-idx^="add-"]');
                    var nextIdx = 'add-' + existing.length;
                    var li = document.createElement('li');
                    li.innerHTML = '<span class="retro-just-text retro-editable" data-idx="' + nextIdx + '" contenteditable="true"></span>';
                    ul.appendChild(li);
                    li.querySelector('.retro-just-text').focus();
                });
            });
        }

        var lastRetroRows = null;
        var lastRetroLinkBase = '';
        var retroSortCol = '';   /* 'rag', 'fa', 'mission' or '' */
        var retroSortDir = 1;   /* 1 = asc, -1 = desc */

        function retroSort(col) {
            /* Save any in-progress edits before re-rendering */
            if (retroEditing) {
                retroSaveOverrides();
                retroEditing = false;
            }
            if (retroSortCol === col) {
                retroSortDir = -retroSortDir;
            } else {
                retroSortCol = col;
                retroSortDir = 1;
            }
            renderRetroFromCache();
        }

        /* ── Paginate retro table into 1280×720 slides ──────────── */
        function retroPaginate() {
            var slide = $retroContent.querySelector('.retro-slide-fit');
            if (!slide) return;
            var table = slide.querySelector('.retro-table');
            if (!table) return;

            var headerEl = slide.querySelector('.retro-header');
            var thead = table.querySelector('thead');
            var tbody = table.querySelector('tbody');
            var rows = Array.from(tbody.querySelectorAll('tr'));
            if (rows.length === 0) return;

            /* Temporarily show retroView if hidden so we can measure */
            var wasHidden = $retroView.hidden;
            if (wasHidden) {
                $retroView.style.position = 'absolute';
                $retroView.style.visibility = 'hidden';
                $retroView.hidden = false;
            }

            var SLIDE_H = 720;
            var PAD = 40;          /* 20px top + 20px bottom */
            var PAGE_IND_H = 22;   /* page indicator line */
            var headerH = headerEl ? headerEl.offsetHeight + 6 : 0;
            var theadH = thead.offsetHeight;

            var budget1 = SLIDE_H - PAD - headerH - theadH - PAGE_IND_H;
            var budgetN = SLIDE_H - PAD - theadH - PAGE_IND_H;

            /* Measure each row */
            var rh = rows.map(function(r) { return r.offsetHeight; });

            /* Restore visibility */
            if (wasHidden) {
                $retroView.hidden = true;
                $retroView.style.position = '';
                $retroView.style.visibility = '';
            }

            /* Split rows into pages */
            var pages = [];
            var page = [];
            var used = 0;
            var budget = budget1;
            for (var i = 0; i < rows.length; i++) {
                if (used + rh[i] > budget && page.length > 0) {
                    pages.push(page);
                    page = [];
                    used = 0;
                    budget = budgetN;
                }
                page.push(i);
                used += rh[i];
            }
            if (page.length > 0) pages.push(page);

            /* If everything fits on one page, no split needed */
            if (pages.length <= 1) return;

            /* Build multiple slide containers */
            var theadHTML = thead.outerHTML;
            var headerHTML = headerEl ? headerEl.outerHTML : '';
            var frag = document.createDocumentFragment();

            for (var p = 0; p < pages.length; p++) {
                var div = document.createElement('div');
                div.className = 'retro-slide retro-slide-fit';
                var html = '';
                if (p === 0) {
                    html += headerHTML;
                }
                html += '<div class="retro-page-indicator">Page ' +
                        (p + 1) + ' / ' + pages.length + '</div>';
                html += '<table class="retro-table">' + theadHTML + '<tbody>';
                for (var r = 0; r < pages[p].length; r++) {
                    html += rows[pages[p][r]].outerHTML;
                }
                html += '</tbody></table>';
                div.innerHTML = html;
                frag.appendChild(div);
            }

            $retroContent.innerHTML = '';
            $retroContent.appendChild(frag);
        }

        function renderRetroFromCache() {
            if (lastRetroRows) renderRetro(lastRetroRows, lastRetroLinkBase);
        }

        /* ── Render RETRO view ───────────────────────────────────── */
        function renderRetro(rows, retroLinkBase) {
            lastRetroRows = rows;
            lastRetroLinkBase = retroLinkBase;
            retroEditing = false;

            /* Load saved overrides */
            var saved = {};
            try { saved = JSON.parse(localStorage.getItem('ar_retro_user')) || {}; } catch(e) {}

            var h = '<div class="retro-slide' + (retroSlideFit ? ' retro-slide-fit' : '') + '">';
            h += '<div class="retro-header">';
            h += '<button type="button" class="retro-fit-btn' + (retroSlideFit ? ' active' : '') + '">&#9634; Slide Fit</button>';
            h += '<button type="button" class="retro-edit-btn">&#9998; Edit</button>';
            h += '</div>';
            var ragOrder = { 'red': 0, 'yellow': 1, 'green': 2, '': 3 };
            function sortArrow(col) {
                if (retroSortCol !== col) return ' <span class="retro-sort-arrow">&#8597;</span>';
                return retroSortDir === 1
                    ? ' <span class="retro-sort-arrow retro-sort-active">&#9650;</span>'
                    : ' <span class="retro-sort-arrow retro-sort-active">&#9660;</span>';
            }

            h += '<table class="retro-table"><thead><tr>';
            h += '<th class="retro-th-rag retro-th-sort" data-sort="rag">RAG' + sortArrow('rag') + '</th>';
            h += '<th class="retro-th-fa retro-th-sort" data-sort="fa">Feature Area' + sortArrow('fa') + '</th>';
            h += '<th class="retro-th-sort" data-sort="mission">Mission' + sortArrow('mission') + '</th>';
            h += '<th>Milestones</th>';
            h += '<th>Justification</th>';
            h += '</tr></thead><tbody>';

            /* Build sortable row data */
            var sortable = [];
            for (var i = 0; i < rows.length; i++) {
                var row = rows[i];
                var ov = saved[row.id] || {};
                var rag = ov.rag || '';
                var fa = ov.featureArea || '';
                var mission = ov.mission || row.mission;
                sortable.push({ row: row, ov: ov, rag: rag, fa: fa, mission: mission });
            }

            if (retroSortCol) {
                function stripBracketPrefix(s) {
                    return (s || '').replace(/^\[/, '').toLowerCase();
                }
                sortable.sort(function(a, b) {
                    var va, vb;
                    if (retroSortCol === 'rag') {
                        va = ragOrder[a.rag] !== undefined ? ragOrder[a.rag] : 3;
                        vb = ragOrder[b.rag] !== undefined ? ragOrder[b.rag] : 3;
                    } else if (retroSortCol === 'fa') {
                        va = (a.fa || '').toLowerCase();
                        vb = (b.fa || '').toLowerCase();
                    } else {
                        va = stripBracketPrefix(a.mission);
                        vb = stripBracketPrefix(b.mission);
                    }
                    if (typeof va === 'string') return va.localeCompare(vb) * retroSortDir;
                    if (va < vb) return -1 * retroSortDir;
                    if (va > vb) return  1 * retroSortDir;
                    return 0;
                });
            }

            for (var si = 0; si < sortable.length; si++) {
                var row = sortable[si].row;
                var ov = sortable[si].ov;
                var rag = sortable[si].rag;
                var fa = sortable[si].fa;
                var mission = sortable[si].mission;

                h += '<tr data-retro-id="' + row.id + '" data-rag="' + rag + '">';

                /* RAG — read-only: big icon; edit: selector (hidden initially) */
                h += '<td class="retro-rag-cell">';
                h += '<select class="retro-rag-sel" data-id="' + row.id + '" hidden>';
                h += '<option value=""'  + (rag === '' ? ' selected' : '') + '>&mdash;</option>';
                h += '<option value="green"' + (rag === 'green' ? ' selected' : '') + '>&#9733; Green</option>';
                h += '<option value="yellow"' + (rag === 'yellow' ? ' selected' : '') + '>&#9650; Yellow</option>';
                h += '<option value="red"' + (rag === 'red' ? ' selected' : '') + '>&#11042; Red</option>';
                h += '</select>';
                h += retroRagIcon(rag);
                h += '</td>';

                /* Feature area — read-only span + hidden input */
                h += '<td>';
                h += '<span class="retro-fa-display">' + (fa || '') + '</span>';
                h += '<input class="retro-fa-input" data-id="' + row.id +
                     '" value="' + fa.replace(/"/g, '&quot;') +
                     '" placeholder="Feature area…" hidden>';
                h += '</td>';

                /* Mission — text, contenteditable toggled by edit button */
                h += '<td class="retro-mission">' + mission + '</td>';

                /* Milestones: bullet list with risk icons + risk selector, text is editable in edit mode */
                h += '<td><ul class="retro-ms-list">';
                var msRendered = 0;
                for (var m = 0; m < row.milestones.length; m++) {
                    var ms = row.milestones[m];
                    var msRiskKey = (ov.milestoneRisks && ov.milestoneRisks[m] !== undefined) ? ov.milestoneRisks[m] : riskToKey(ms.risk);
                    var msText = (ov.milestones && ov.milestones[m] !== undefined) ? ov.milestones[m] : ms.title;
                    /* Skip items the user cleared */
                    if (ov.milestones && ov.milestones[m] !== undefined && msText.trim() === '') continue;
                    msRendered++;
                    h += '<li>';
                    /* Read-only icon */
                    h += '<span class="retro-ms-icon-display">' + retroIconFromKey(msRiskKey) + '</span>';
                    /* Edit-mode selector (hidden by default) */
                    h += '<select class="retro-ms-risk-sel" data-idx="' + m + '" hidden>';
                    h += '<option value=""' + (msRiskKey === '' ? ' selected' : '') + '>&mdash;</option>';
                    h += '<option value="green"' + (msRiskKey === 'green' ? ' selected' : '') + '>&#9733; Green</option>';
                    h += '<option value="yellow"' + (msRiskKey === 'yellow' ? ' selected' : '') + '>&#9650; Yellow</option>';
                    h += '<option value="red"' + (msRiskKey === 'red' ? ' selected' : '') + '>&#11042; Red</option>';
                    h += '</select> ';
                    h += '<span class="retro-ms-text" data-idx="' + m + '">' + msText + '</span>';
                    h += '</li>';
                }
                /* Also render any user-added milestones (add-0, add-1, …) */
                if (ov.milestones) {
                    var addIdx = 0;
                    while (ov.milestones['add-' + addIdx] !== undefined) {
                        var addText = ov.milestones['add-' + addIdx];
                        var addRisk = (ov.milestoneRisks && ov.milestoneRisks['add-' + addIdx]) || '';
                        if (addText.trim() !== '') {
                            msRendered++;
                            h += '<li>';
                            h += '<span class="retro-ms-icon-display">' + retroIconFromKey(addRisk) + '</span>';
                            h += '<select class="retro-ms-risk-sel" data-idx="add-' + addIdx + '" hidden>';
                            h += '<option value=""' + (addRisk === '' ? ' selected' : '') + '>&mdash;</option>';
                            h += '<option value="green"' + (addRisk === 'green' ? ' selected' : '') + '>&#9733; Green</option>';
                            h += '<option value="yellow"' + (addRisk === 'yellow' ? ' selected' : '') + '>&#9650; Yellow</option>';
                            h += '<option value="red"' + (addRisk === 'red' ? ' selected' : '') + '>&#11042; Red</option>';
                            h += '</select> ';
                            h += '<span class="retro-ms-text" data-idx="add-' + addIdx + '">' + addText + '</span>';
                            h += '</li>';
                        }
                        addIdx++;
                    }
                }
                h += '</ul>';
                h += '<button type="button" class="retro-add-ms-btn" data-id="' + row.id + '" hidden title="Add milestone">+ Add</button>';
                h += '</td>';

                /* Justification — editable text */
                h += '<td><ul class="retro-just-list">';
                var justRendered = 0;
                for (var j = 0; j < row.justifications.length; j++) {
                    var justText = (ov.justifications && ov.justifications[j] !== undefined) ? ov.justifications[j] : row.justifications[j];
                    /* Skip items the user cleared */
                    if (ov.justifications && ov.justifications[j] !== undefined && justText.trim() === '') continue;
                    justRendered++;
                    h += '<li><span class="retro-just-text" data-idx="' + j + '">' + (justText || '') + '</span></li>';
                }
                /* Also render any user-added justifications */
                if (ov.justifications) {
                    var addJIdx = 0;
                    while (ov.justifications['add-' + addJIdx] !== undefined) {
                        var addJText = ov.justifications['add-' + addJIdx];
                        if (addJText.trim() !== '') {
                            justRendered++;
                            h += '<li><span class="retro-just-text" data-idx="add-' + addJIdx + '">' + addJText + '</span></li>';
                        }
                        addJIdx++;
                    }
                }
                h += '</ul>';
                h += '<button type="button" class="retro-add-just-btn" data-id="' + row.id + '" hidden title="Add justification">+ Add</button>';
                h += '</td>';

                h += '</tr>';
            }

            h += '</tbody></table></div>';

            $retroContent.innerHTML = h;
            if ($retroEmpty) $retroEmpty.hidden = true;

            /* Paginate into multiple slides if content overflows in slide-fit mode */
            if (retroSlideFit) retroPaginate();

            /* Wire buttons */
            $retroContent.querySelector('.retro-edit-btn').addEventListener('click', retroToggleEdit);
            $retroContent.querySelector('.retro-fit-btn').addEventListener('click', retroToggleFit);

            /* Wire sortable headers */
            $retroContent.querySelectorAll('.retro-th-sort').forEach(function(th) {
                th.addEventListener('click', function() { retroSort(th.dataset.sort); });
            });
        }

        /* ── Fetch data on Run ──────────────────────────────────── */
        document.getElementById('configForm').onsubmit = async function (e) {
            e.preventDefault();
            var url = $query.value.trim();
            if (!url) return;
            localStorage.setItem('ar_query', url);

            var midDate = $midDate.value || '';
            localStorage.setItem('ar_middate', midDate);

            $run.disabled = true;
            $run.textContent = 'Loading…';
            $loading.hidden = false;

            /* Clear retro overrides so ADO is source of truth on re-Run */
            localStorage.removeItem('ar_retro_user');

            try {
                /* Always fetch all three so toggling views is instant */
                var slidePayload = { queryUrl: url };
                if (midDate) slidePayload.midpointDate = midDate;

                var [slideRes, docRes, retroRes] = await Promise.all([
                    fetch('/api/slides', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(slidePayload)
                    }),
                    fetch('/api/doc', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ queryUrl: url })
                    }),
                    fetch('/api/retro', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ queryUrl: url })
                    })
                ]);

                var slideData = await slideRes.json();
                var docData   = await docRes.json();
                var retroData = await retroRes.json();

                if (slideData.error) throw new Error(slideData.error);
                if (docData.error)   throw new Error(docData.error);
                if (retroData.error) throw new Error(retroData.error);

                linkBase    = slideData.linkBase || 'https://microsoft.visualstudio.com/Edge/_workitems/edit/';
                hasMidpoint = !!slideData.hasMidpoint;
                lastSlides  = slideData.slides;

                renderSlides(slideData.slides);
                renderRetro(retroData.rows, retroData.linkBase || linkBase);
                renderDoc(docData.sections, docData.linkBase || linkBase);
                $pptxBtn.hidden = false;
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                $run.disabled = false;
                $run.textContent = '\u25B6 Run';
                $loading.hidden = true;
            }
        };

        // Expose live state that the external PPTX script reads at click-time.
        window.__arPptxState = {
            getHasMidpoint: function () { return hasMidpoint; },
            getLastSlides: function () { return lastSlides || []; },
            getPipelineStages: function () { return PL_STAGES; },
            loadPipeline: function () { return plLoad(); }
        };

        /* Show Top-of-Mind + Pipeline immediately (no data needed) */
        renderSlides([]);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3/dist/pptxgen.bundle.js"></script>
    <script src="pptx-export.js"></script>
</body>
