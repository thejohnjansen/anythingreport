        var lastRetroRows = null;
        var lastRetroLinkBase = '';
        var retroSortCol = '';   /* 'rag', 'fa', 'mission' or '' */
        var retroSortDir = 1;   /* 1 = asc, -1 = desc */

        function retroSort(col) {
            /* Save any in-progress edits before re-rendering */
            if (retroEditing) {
                retroSaveOverrides();
                retroEditing = false;
            }
            if (retroSortCol === col) {
                retroSortDir = -retroSortDir;
            } else {
                retroSortCol = col;
                retroSortDir = 1;
            }
            renderRetroFromCache();
        }

        /* ── Paginate retro table into 1280×720 slides ──────────── */
        function retroPaginate() {
            var slide = $retroContent.querySelector('.retro-slide-fit');
            if (!slide) return;
            var table = slide.querySelector('.retro-table');
            if (!table) return;

            var headerEl = slide.querySelector('.retro-header');
            var thead = table.querySelector('thead');
            var tbody = table.querySelector('tbody');
            var rows = Array.from(tbody.querySelectorAll('tr'));
            if (rows.length === 0) return;

            /* Temporarily show retroView if hidden so we can measure */
            var wasHidden = $retroView.hidden;
            if (wasHidden) {
                $retroView.style.position = 'absolute';
                $retroView.style.visibility = 'hidden';
                $retroView.hidden = false;
            }

            var SLIDE_H = 720;
            var PAD = 40;          /* 20px top + 20px bottom */
            var PAGE_IND_H = 22;   /* page indicator line */
            var headerH = headerEl ? headerEl.offsetHeight + 6 : 0;
            var theadH = thead.offsetHeight;

            var budget1 = SLIDE_H - PAD - headerH - theadH - PAGE_IND_H;
            var budgetN = SLIDE_H - PAD - theadH - PAGE_IND_H;

            /* Measure each row */
            var rh = rows.map(function(r) { return r.offsetHeight; });

            /* Restore visibility */
            if (wasHidden) {
                $retroView.hidden = true;
                $retroView.style.position = '';
                $retroView.style.visibility = '';
            }

            /* Split rows into pages */
            var pages = [];
            var page = [];
            var used = 0;
            var budget = budget1;
            for (var i = 0; i < rows.length; i++) {
                if (used + rh[i] > budget && page.length > 0) {
                    pages.push(page);
                    page = [];
                    used = 0;
                    budget = budgetN;
                }
                page.push(i);
                used += rh[i];
            }
            if (page.length > 0) pages.push(page);

            /* If everything fits on one page, no split needed */
            if (pages.length <= 1) return;

            /* Build multiple slide containers */
            var theadHTML = thead.outerHTML;
            var headerHTML = headerEl ? headerEl.outerHTML : '';
            var frag = document.createDocumentFragment();

            for (var p = 0; p < pages.length; p++) {
                var div = document.createElement('div');
                div.className = 'retro-slide retro-slide-fit';
                var html = '';
                if (p === 0) {
                    html += headerHTML;
                }
                html += '<div class="retro-page-indicator">Page ' +
                        (p + 1) + ' / ' + pages.length + '</div>';
                html += '<table class="retro-table">' + theadHTML + '<tbody>';
                for (var r = 0; r < pages[p].length; r++) {
                    html += rows[pages[p][r]].outerHTML;
                }
                html += '</tbody></table>';
                div.innerHTML = html;
                frag.appendChild(div);
            }

            $retroContent.innerHTML = '';
            $retroContent.appendChild(frag);
        }

        function renderRetroFromCache() {
            if (lastRetroRows) renderRetro(lastRetroRows, lastRetroLinkBase);
        }

        async function parseApiJson(res, name) {
            var text = await res.text();
            var data = null;

            try {
                data = text ? JSON.parse(text) : {};
            } catch (e) {
                var snippet = (text || '').replace(/\s+/g, ' ').trim().slice(0, 300);
                throw new Error(name + ' returned non-JSON response' + (snippet ? ': ' + snippet : '.'));
            }

            if (!res.ok) {
                throw new Error(name + ' failed (' + res.status + '): ' + (data.error || res.statusText || 'Unknown error'));
            }

            if (data && data.error) {
                throw new Error(name + ' error: ' + data.error);
            }

            return data;
        }

        function getApiBaseUrl() {
            if (window.__arApiConfig && window.__arApiConfig.baseUrl) {
                return window.__arApiConfig.baseUrl.replace(/\/+$/, '');
            }

            return '/api';
        }

        function getApiUrl(path) {
            return getApiBaseUrl() + path;
        }

        /* ── Render RETRO view ───────────────────────────────────── */
        function renderRetro(rows, retroLinkBase) {
            lastRetroRows = rows;
            lastRetroLinkBase = retroLinkBase;
            retroEditing = false;

            /* Load saved overrides */
            var saved = {};
            try { saved = JSON.parse(localStorage.getItem('ar_retro_user')) || {}; } catch(e) {}

            var h = '<div class="retro-slide' + (retroSlideFit ? ' retro-slide-fit' : '') + '">';
            h += '<div class="retro-header">';
            h += '<button type="button" class="retro-fit-btn' + (retroSlideFit ? ' active' : '') + '">&#9634; Slide Fit</button>';
            h += '<button type="button" class="retro-edit-btn">&#9998; Edit</button>';
            h += '</div>';
            var ragOrder = { 'red': 0, 'yellow': 1, 'green': 2, '': 3 };
            function sortArrow(col) {
                if (retroSortCol !== col) return ' <span class="retro-sort-arrow">&#8597;</span>';
                return retroSortDir === 1
                    ? ' <span class="retro-sort-arrow retro-sort-active">&#9650;</span>'
                    : ' <span class="retro-sort-arrow retro-sort-active">&#9660;</span>';
            }

            h += '<table class="retro-table"><thead><tr>';
            h += '<th class="retro-th-rag retro-th-sort" data-sort="rag">RAG' + sortArrow('rag') + '</th>';
            h += '<th class="retro-th-fa retro-th-sort" data-sort="fa">Feature Area' + sortArrow('fa') + '</th>';
            h += '<th class="retro-th-sort" data-sort="mission">Mission' + sortArrow('mission') + '</th>';
            h += '<th>Milestones</th>';
            h += '<th>Justification</th>';
            h += '</tr></thead><tbody>';

            /* Build sortable row data */
            var sortable = [];
            for (var i = 0; i < rows.length; i++) {
                var row = rows[i];
                var ov = saved[row.id] || {};
                var rag = (ov.rag !== undefined) ? ov.rag : (row.rag || '');
                var fa = (ov.featureArea !== undefined) ? ov.featureArea : (row.featureArea || '');
                var mission = ov.mission || row.mission;
                sortable.push({ row: row, ov: ov, rag: rag, fa: fa, mission: mission });
            }

            if (retroSortCol) {
                function stripBracketPrefix(s) {
                    return (s || '').replace(/^\[/, '').toLowerCase();
                }
                sortable.sort(function(a, b) {
                    var va, vb;
                    if (retroSortCol === 'rag') {
                        va = ragOrder[a.rag] !== undefined ? ragOrder[a.rag] : 3;
                        vb = ragOrder[b.rag] !== undefined ? ragOrder[b.rag] : 3;
                    } else if (retroSortCol === 'fa') {
                        va = (a.fa || '').toLowerCase();
                        vb = (b.fa || '').toLowerCase();
                    } else {
                        va = stripBracketPrefix(a.mission);
                        vb = stripBracketPrefix(b.mission);
                    }
                    if (typeof va === 'string') return va.localeCompare(vb) * retroSortDir;
                    if (va < vb) return -1 * retroSortDir;
                    if (va > vb) return  1 * retroSortDir;
                    return 0;
                });
            }

            for (var si = 0; si < sortable.length; si++) {
                var row = sortable[si].row;
                var ov = sortable[si].ov;
                var rag = sortable[si].rag;
                var fa = sortable[si].fa;
                var mission = sortable[si].mission;

                h += '<tr data-retro-id="' + row.id + '" data-rag="' + rag + '">';

                /* RAG — read-only: big icon; edit: selector (hidden initially) */
                h += '<td class="retro-rag-cell">';
                h += '<select class="retro-rag-sel" data-id="' + row.id + '" hidden>';
                h += '<option value=""'  + (rag === '' ? ' selected' : '') + '>&mdash;</option>';
                h += '<option value="green"' + (rag === 'green' ? ' selected' : '') + '>&#9733; Green</option>';
                h += '<option value="yellow"' + (rag === 'yellow' ? ' selected' : '') + '>&#9650; Yellow</option>';
                h += '<option value="red"' + (rag === 'red' ? ' selected' : '') + '>&#11042; Red</option>';
                h += '</select>';
                h += '<span class="retro-rag-display">' + retroRagIcon(rag) + '</span>';
                h += '</td>';

                /* Feature area — read-only span + hidden input */
                h += '<td>';
                h += '<span class="retro-fa-display">' + (fa || '') + '</span>';
                h += '<input class="retro-fa-input" data-id="' + row.id +
                     '" value="' + fa.replace(/"/g, '&quot;') +
                     '" placeholder="Feature area…" hidden>';
                h += '</td>';

                /* Mission — text, contenteditable toggled by edit button */
                h += '<td class="retro-mission">' + mission + '</td>';

                /* Milestones: bullet list with risk icons + risk selector, text is editable in edit mode */
                h += '<td><ul class="retro-ms-list">';
                var msRendered = 0;
                for (var m = 0; m < row.milestones.length; m++) {
                    var ms = row.milestones[m];
                    var msRiskKey = (ov.milestoneRisks && ov.milestoneRisks[m] !== undefined) ? ov.milestoneRisks[m] : riskToKey(ms.risk);
                    var msText = (ov.milestones && ov.milestones[m] !== undefined) ? ov.milestones[m] : ms.title;
                    /* Skip items the user cleared */
                    if (ov.milestones && ov.milestones[m] !== undefined && msText.trim() === '') continue;
                    msRendered++;
                    h += '<li>';
                    /* Read-only icon */
                    h += '<span class="retro-ms-icon-display">' + retroIconFromKey(msRiskKey) + '</span>';
                    /* Edit-mode selector (hidden by default) */
                    h += '<select class="retro-ms-risk-sel" data-idx="' + m + '" hidden>';
                    h += '<option value=""' + (msRiskKey === '' ? ' selected' : '') + '>&mdash;</option>';
                    h += '<option value="green"' + (msRiskKey === 'green' ? ' selected' : '') + '>&#9733; Green</option>';
                    h += '<option value="yellow"' + (msRiskKey === 'yellow' ? ' selected' : '') + '>&#9650; Yellow</option>';
                    h += '<option value="red"' + (msRiskKey === 'red' ? ' selected' : '') + '>&#11042; Red</option>';
                    h += '</select> ';
                    h += '<span class="retro-ms-text" data-idx="' + m + '">' + msText + '</span>';
                    h += '</li>';
                }
                /* Also render any user-added milestones (add-0, add-1, …) */
                if (ov.milestones) {
                    var addIdx = 0;
                    while (ov.milestones['add-' + addIdx] !== undefined) {
                        var addText = ov.milestones['add-' + addIdx];
                        var addRisk = (ov.milestoneRisks && ov.milestoneRisks['add-' + addIdx]) || '';
                        if (addText.trim() !== '') {
                            msRendered++;
                            h += '<li>';
                            h += '<span class="retro-ms-icon-display">' + retroIconFromKey(addRisk) + '</span>';
                            h += '<select class="retro-ms-risk-sel" data-idx="add-' + addIdx + '" hidden>';
                            h += '<option value=""' + (addRisk === '' ? ' selected' : '') + '>&mdash;</option>';
                            h += '<option value="green"' + (addRisk === 'green' ? ' selected' : '') + '>&#9733; Green</option>';
                            h += '<option value="yellow"' + (addRisk === 'yellow' ? ' selected' : '') + '>&#9650; Yellow</option>';
                            h += '<option value="red"' + (addRisk === 'red' ? ' selected' : '') + '>&#11042; Red</option>';
                            h += '</select> ';
                            h += '<span class="retro-ms-text" data-idx="add-' + addIdx + '">' + addText + '</span>';
                            h += '</li>';
                        }
                        addIdx++;
                    }
                }
                h += '</ul>';
                h += '<button type="button" class="retro-add-ms-btn" data-id="' + row.id + '" hidden title="Add milestone">+ Add</button>';
                h += '</td>';

                /* Justification — editable text */
                h += '<td><ul class="retro-just-list">';
                var justRendered = 0;
                for (var j = 0; j < row.justifications.length; j++) {
                    var justText = (ov.justifications && ov.justifications[j] !== undefined) ? ov.justifications[j] : row.justifications[j];
                    /* Skip items the user cleared */
                    if (ov.justifications && ov.justifications[j] !== undefined && justText.trim() === '') continue;
                    justRendered++;
                    h += '<li><span class="retro-just-text" data-idx="' + j + '">' + (justText || '') + '</span></li>';
                }
                /* Also render any user-added justifications */
                if (ov.justifications) {
                    var addJIdx = 0;
                    while (ov.justifications['add-' + addJIdx] !== undefined) {
                        var addJText = ov.justifications['add-' + addJIdx];
                        if (addJText.trim() !== '') {
                            justRendered++;
                            h += '<li><span class="retro-just-text" data-idx="add-' + addJIdx + '">' + addJText + '</span></li>';
                        }
                        addJIdx++;
                    }
                }
                h += '</ul>';
                h += '<button type="button" class="retro-add-just-btn" data-id="' + row.id + '" hidden title="Add justification">+ Add</button>';
                h += '</td>';

                h += '</tr>';
            }

            h += '</tbody></table></div>';

            $retroContent.innerHTML = h;
            if ($retroEmpty) $retroEmpty.hidden = true;

            /* Paginate into multiple slides if content overflows in slide-fit mode */
            if (retroSlideFit) retroPaginate();

            /* Wire buttons */
            $retroContent.querySelector('.retro-edit-btn').addEventListener('click', retroToggleEdit);
            $retroContent.querySelector('.retro-fit-btn').addEventListener('click', retroToggleFit);

            /* Wire sortable headers */
            $retroContent.querySelectorAll('.retro-th-sort').forEach(function(th) {
                th.addEventListener('click', function() { retroSort(th.dataset.sort); });
            });
        }

        /* ── Fetch data on Run ──────────────────────────────────── */
        document.getElementById('configForm').onsubmit = async function (e) {
            e.preventDefault();
            var url = $query.value.trim();
            if (!url) return;
            localStorage.setItem('ar_query', url);

            var midDate = $midDate.value || '';
            localStorage.setItem('ar_middate', midDate);

            $run.disabled = true;
            $run.textContent = 'Loading…';
            $loading.hidden = false;

            /* Clear retro overrides so ADO is source of truth on re-Run */
            localStorage.removeItem('ar_retro_user');

            try {
                /* Always fetch all three so toggling views is instant */
                var slidePayload = { queryUrl: url };
                if (midDate) slidePayload.midpointDate = midDate;
                if (flatView) slidePayload.flatView = true;

                var [slideRes, docRes, retroRes] = await Promise.all([
                    fetch(getApiUrl('/slides'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(slidePayload)
                    }),
                    fetch(getApiUrl('/doc'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ queryUrl: url })
                    }),
                    fetch(getApiUrl('/retro'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ queryUrl: url })
                    })
                ]);

                var [slideData, docData, retroData] = await Promise.all([
                    parseApiJson(slideRes, 'Slides API'),
                    parseApiJson(docRes, 'Doc API'),
                    parseApiJson(retroRes, 'Retro API')
                ]);

                linkBase    = slideData.linkBase || 'https://microsoft.visualstudio.com/Edge/_workitems/edit/';
                hasMidpoint = !!slideData.hasMidpoint;
                lastSlides  = slideData.slides;
                baseSlideTitle = slideData.baseSlideTitle || 'Layout';
                var prevTeamSlug = teamSlugFromName(baseTeamName);
                baseTeamName = slideData.baseTeamName || '';
                if (baseTeamName) localStorage.setItem('ar_team_name', baseTeamName);
                deckFileName = slideData.deckFileName || 'anything-report';
                cycleNumber = slideData.cycleNumber || '';
                if (cycleNumber) localStorage.setItem('ar_cycle_number', cycleNumber);

                renderSlides(slideData.slides);

                /* Persist flat-team list so pipelines appear before next Run */
                if (flatView) {
                    var flatTeamNames = (slideData.slides || [])
                        .filter(function(s) { return String(s.id || '').indexOf('flat-') === 0; })
                        .map(function(s) { return extractTeamNameFromSlideTitle(s.title); });
                    localStorage.setItem('ar_flat_team_names', JSON.stringify(flatTeamNames));
                } else {
                    localStorage.removeItem('ar_flat_team_names');
                }

                renderRetro(retroData.rows, retroData.linkBase || linkBase);
                renderDoc(docData.sections, docData.linkBase || linkBase);
                $pptxBtn.hidden = false;

                /* If the team changed, reload pipeline and top-of-mind from Cosmos */
                var newTeamSlug = teamSlugFromName(baseTeamName);
                if (newTeamSlug !== prevTeamSlug) {
                    var newTomDoc = await boardGet('topofmind', newTeamSlug);
                    if (newTomDoc) {
                        boardVersions['topofmind:' + newTeamSlug] = newTomDoc.version;
                    }
                    var newTomContent = (newTomDoc && newTomDoc.content) || '';
                    localStorage.setItem('ar_tom', newTomContent);
                    var $tom = document.getElementById('tom');
                    if ($tom) $tom.innerHTML = newTomContent;
                    var newPlDoc = await boardGet('pipeline', newTeamSlug);
                    if (newPlDoc) {
                        boardVersions['pipeline:' + newTeamSlug] = newPlDoc.version;
                        try {
                            var newPl = JSON.parse(newPlDoc.content);
                            localStorage.setItem('ar_pipeline', JSON.stringify(newPl));
                            refreshPipelineVisualization('ar_pipeline', newPl);
                        } catch (e) { /* ignore */ }
                    }
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                $run.disabled = false;
                $run.textContent = '\u25B6 Run';
                $loading.hidden = true;
            }
        };

        // Expose live state that the external PPTX script reads at click-time.
        window.__arPptxState = {
            getHasMidpoint: function () { return hasMidpoint; },
            getLastSlides: function () { return lastSlides || []; },
            getPipelineStages: function () { return PL_STAGES; },
            loadPipeline: function () { return plLoad('ar_pipeline'); },
            loadTeamPipelines: function () {
                var map = {};
                var slides = lastSlides || [];
                slides.forEach(function (slide) {
                    if (String(slide.id || '').indexOf('flat-') !== 0) return;
                    var team = extractTeamNameFromSlideTitle(slide.title);
                    map[team] = plLoad(teamPipelineStorageKey(team)) || {
                        title: teamPipelineTitle(team),
                        queryUrl: '',
                        rows: []
                    };
                });
                return map;
            },
            getFlatView: function () { return flatView; },
            getBaseSlideTitle: function () { return baseSlideTitle; },
            getBaseTeamName: function () { return baseTeamName; },
            getDeckFileName: function () { return deckFileName; },
            getCycleNumber: function () { return cycleNumber; }
        };

        // Optional PPTX branding overrides consumed by pptx-export.js.
        // Replace these values with your template font/color choices.
        window.__arPptxTheme = {
            // Example: 'pptx_inspect/background.png'
            backgroundImageUrl: 'pptx_inspect/slideTemplate.png',
            titleFont: 'Aptos Display',
            titleFontSize: 28,
            titleX: 2.0,
            titleY: 0.18,
            titleW: 10.6,
            titleH: 0.62,
            bodyFont: 'Aptos',
            emojiFont: 'Segoe UI Emoji',
            bgColor: 'FFFFFF',
            titleColor: '0E2841',
            bodyColor: '000000',
            mutedTextColor: '467886',
            headerFillColor: '156082',
            rowAltColor: 'F8FAFC',
            borderColor: 'D1D5DB',
            linkColor: '467886',
            pipelineLineColor: '999999',
            pipelineCompleteColor: '4EA72E',
            pipelineCommittedFillColor: 'E9F7EF',
            pipelineFutureColor: '9CA3AF',
            topicPillFillColor: 'DDDDDD',
            topicPillBorderColor: '666666',
            topicPillRadius: 0.12,
            topicPillTextColor: '0E2841'
        };

        /* Show Top-of-Mind and Pipeline slides immediately (before first Run). */
        var storedFlatTeams = flatView ? getStoredFlatTeamNames() : null;
        renderSlides([], { showPipelineWhenEmpty: true, preloadFlatTeams: storedFlatTeams });

        /* ── Board startup: load from Cosmos and begin polling ─── */
        var debouncedTomSave = debounce(function(teamSlug, html) {
            var key = 'topofmind:' + teamSlug;
            boardPut('topofmind', teamSlug, html, boardVersions[key]);
        }, 1500);

        (async function initBoard() {
            await initBoardConfig();

            /* Load Top of Mind from server (may be newer than localStorage) */
            var tomTeamSlug = teamSlugFromName(baseTeamName);
            var tomDoc = await boardGet('topofmind', tomTeamSlug);
            if (tomDoc) {
                boardVersions['topofmind:' + tomTeamSlug] = tomDoc.version;
                if (tomDoc.content) {
                    localStorage.setItem('ar_tom', tomDoc.content);
                    var $tom = document.getElementById('tom');
                    if ($tom) $tom.innerHTML = tomDoc.content;
                }
            }

            /* Load pipeline from server using team-scoped slug */
            var plTeamSlug = teamSlugFromName(baseTeamName);
            var plDoc = await boardGet('pipeline', plTeamSlug);
            if (plDoc) {
                boardVersions['pipeline:' + plTeamSlug] = plDoc.version;
                try {
                    var pl = JSON.parse(plDoc.content);
                    localStorage.setItem('ar_pipeline', JSON.stringify(pl));
                    refreshPipelineVisualization('ar_pipeline', pl);
                } catch (e) { /* ignore */ }
            }

            /* Load per-team pipelines for flat-view pre-Run display */
            var initFlatTeams = flatView ? getStoredFlatTeamNames() : null;
            if (initFlatTeams && initFlatTeams.length > 0) {
                for (var ti = 0; ti < initFlatTeams.length; ti++) {
                    var ftName = initFlatTeams[ti];
                    var ftKey = teamPipelineStorageKey(ftName);
                    var ftSlug = storageKeyToTeamSlug(ftKey);
                    var ftDoc = await boardGet('pipeline', ftSlug);
                    if (ftDoc) {
                        boardVersions['pipeline:' + ftSlug] = ftDoc.version;
                        try {
                            var ftPl = JSON.parse(ftDoc.content);
                            localStorage.setItem(ftKey, JSON.stringify(ftPl));
                            refreshPipelineVisualization(ftKey, ftPl);
                        } catch (e) { /* ignore */ }
                    }
                }
            }

            startCollaborativePolling();
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3/dist/pptxgen.bundle.js"></script>
    <script src="pptx-export.js"></script>
</body>
</html>
