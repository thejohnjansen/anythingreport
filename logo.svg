<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="badge">
      <rect width="200" height="200" rx="36"/>
    </clipPath>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="200" height="200" rx="36" fill="#0E2841"/>
  <!-- Subtle top-to-bottom gradient overlay -->
  <rect width="200" height="200" rx="36" fill="url(#bg-grad)"/>

  <!-- ── Table structure (clipped to badge) ─────────────────── -->

  <!-- Alternating row tints (rows 2 and 4) -->
  <rect x="0" y="70" width="200" height="44" fill="#0b1e30" clip-path="url(#badge)"/>
  <rect x="0" y="157" width="200" height="43" fill="#0b1e30" clip-path="url(#badge)"/>

  <!-- Header strip -->
  <rect x="0" y="0" width="200" height="26" fill="#156082" clip-path="url(#badge)"/>
  <!-- Header column label placeholders -->
  <rect x="32" y="9"  width="32" height="7" rx="2" fill="white" opacity="0.45"/>
  <rect x="72" y="9"  width="52" height="7" rx="2" fill="white" opacity="0.28"/>
  <rect x="134" y="9" width="44" height="7" rx="2" fill="white" opacity="0.28"/>

  <!-- Horizontal row dividers -->
  <line x1="0" y1="70"  x2="200" y2="70"  stroke="#1c3d5c" stroke-width="1"/>
  <line x1="0" y1="114" x2="200" y2="114" stroke="#1c3d5c" stroke-width="1"/>
  <line x1="0" y1="157" x2="200" y2="157" stroke="#1c3d5c" stroke-width="1"/>

  <!-- Vertical status-column divider -->
  <line x1="27" y1="26" x2="27" y2="200" stroke="#1c3d5c" stroke-width="1"/>

  <!-- Row 1 — y center 48 -->
  <circle cx="13" cy="48" r="5" fill="#4EA72E"  opacity="0.85"/>
  <rect x="34" y="43" width="80" height="7" rx="2" fill="#1c3d5c" opacity="0.9"/>
  <rect x="122" y="43" width="55" height="7" rx="2" fill="#1c3d5c" opacity="0.6"/>

  <!-- Row 2 — y center 92 -->
  <circle cx="13" cy="92" r="5" fill="#E53935"  opacity="0.9"/>
  <rect x="34" y="87" width="62" height="7" rx="2" fill="#1c3d5c" opacity="0.9"/>
  <rect x="122" y="87" width="68" height="7" rx="2" fill="#1c3d5c" opacity="0.6"/>

  <!-- Row 3 — y center 135 -->
  <circle cx="13" cy="135" r="5" fill="#156082" opacity="0.9"/>
  <rect x="34" y="130" width="88" height="7" rx="2" fill="#1c3d5c" opacity="0.9"/>
  <rect x="122" y="130" width="48" height="7" rx="2" fill="#1c3d5c" opacity="0.6"/>

  <!-- Row 4 — y center 178 -->
  <circle cx="13" cy="178" r="5" fill="#467886" opacity="0.65"/>
  <rect x="34" y="173" width="52" height="7" rx="2" fill="#1c3d5c" opacity="0.75"/>
  <rect x="122" y="173" width="42" height="7" rx="2" fill="#1c3d5c" opacity="0.45"/>

  <!-- ── Foreground text ──────────────────────────────────────── -->

  <!-- "CYCLE" lettermark -->
  <text x="103" y="113"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="52"
        font-weight="800"
        fill="white"
        text-anchor="middle"
        letter-spacing="-1">CYCLE</text>

  <!-- "Review" label -->
  <text x="103" y="138"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="19"
        font-weight="600"
        fill="#7ec8e3"
        text-anchor="middle"
        letter-spacing="5">REVIEW</text>
</svg>
